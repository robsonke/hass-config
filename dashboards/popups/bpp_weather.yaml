# Bubble Card native pop-up (hash #weer) — weer in Kloetinge.
# Modernized from the old layout-card grid to stacked Bubble sections.
type: custom:bubble-card
card_type: pop-up
buttons_position: left
popup_mode: centered
full_width_on_mobile: true
width_desktop: 900px
hash: '#weer'
name: Het weer in Kloetinge
icon: mdi:weather-partly-cloudy
# header = huidige temperatuur + (gelokaliseerde) conditie
entity: weather.weather_langeweide_ecowitt
show_state: true
styles: |
  .bubble-button-background { opacity: 1 !important; background-color: rgba(55,138,221,0.13) !important; }
  .bubble-icon-container { background-color: rgba(55,138,221,0.20) !important; }
  .bubble-state { font-size: 0 !important; }
  .bubble-state::after {
    font-size: 14px !important; font-weight: 500; color: #82bbf0 !important;
    content: "${(() => { const w = hass.states['weather.weather_langeweide_ecowitt']; if (!w) return '—'; const t = w.attributes?.temperature; const cond = hass.formatEntityState ? hass.formatEntityState(w) : w.state; return (t != null ? Math.round(t) + '°C' : '—') + (cond ? ' · ' + cond : ''); })()}";
  }
cards:
  # ── nu & verwachting ──────────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: Nu & verwachting
  - type: custom:weather-card
    entity: weather.weather_langeweide_ecowitt
    current: true
    details: true
    forecast: true
    hourly_forecast: false
    number_of_forecasts: '5'
  # ── regen ─────────────────────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: Regen
  - type: entities
    show_header_toggle: false
    entities:
      - entity: sensor.rate_rain_piezo
        name: Nu
        icon: mdi:weather-pouring
      - entity: sensor.daily_rain_piezo
        name: Vandaag
        icon: mdi:calendar-today
      - entity: sensor.weekly_rain_piezo
        name: Deze week
        icon: mdi:calendar-week
      - entity: sensor.monthly_rain_piezo
        name: Deze maand
        icon: mdi:calendar-month
  - type: 'custom:buien-rain-forecast'
    long: !secret longitude_coordinate
    lat: !secret latitude_coordinate
    lineColor: 'rgba(89, 160, 238, 1)'
    fillColor: 'rgba(89, 160, 238, 0.2)'
    update_interval: 10
    icon: 'mdi:weather-rainy'
    style: |
      .chartjs-render-monitor {
        height: 200px;
      }
  # ── buienradar ────────────────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: Buienradar
  - type: picture-glance
    entities: []
    camera_image: camera.buienradar
  # ── verloop ───────────────────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: Temperatuur (24 uur)
  - type: history-graph
    hours_to_show: 24
    refresh_interval: 30
    entities:
      - sensor.temp
