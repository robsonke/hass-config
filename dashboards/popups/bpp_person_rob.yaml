# Bubble Card native pop-up (#person-rob) — Rob presence.
type: custom:bubble-card
card_type: pop-up
buttons_position: left
popup_mode: centered
full_width_on_mobile: true
width_desktop: 1000px
hash: '#person-rob'
name: Rob
icon: mdi:account
# header = aanwezigheid (groen thuis, blauw op werk/zone, dim onderweg) + duur
entity: person.rob
show_state: true
styles: |
  .bubble-button-background { opacity: 1 !important; background-color: ${(() => { const s = hass.states['person.rob']?.state; return s === 'home' ? 'rgba(45,170,115,0.14)' : (s === 'not_home') ? 'rgba(255,255,255,0.04)' : 'rgba(55,138,221,0.16)'; })()} !important; }
  .bubble-icon-container { background-color: ${(() => { const s = hass.states['person.rob']?.state; return s === 'home' ? 'rgba(45,170,115,0.20)' : (s === 'not_home') ? 'rgba(255,255,255,0.07)' : 'rgba(55,138,221,0.22)'; })()} !important; }
  .bubble-state { font-size: 0 !important; }
  .bubble-state::after {
    font-size: 14px !important; font-weight: 500;
    color: ${(() => { const s = hass.states['person.rob']?.state; return s === 'home' ? '#9ed9bd' : (s === 'not_home') ? '#9b9aac' : '#82bbf0'; })()} !important;
    content: "${(() => { const p = hass.states['person.rob']; const s = p?.state; const label = ({ home: 'Thuis', not_home: 'Onderweg' })[s] || s; const t = p?.last_changed; const secs = (Date.now() - new Date(t)) / 1000; let d; if (secs < 60) d = 'net'; else if (secs < 3600) d = Math.round(secs/60) + ' min'; else if (secs < 86400) d = Math.round(secs/3600) + ' uur'; else { const dy = Math.round(secs/86400); d = dy + (dy === 1 ? ' dag' : ' dagen'); } return label + ' · ' + d; })()}";
  }
cards:
  # ── bed (Auping) ──────────────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: Bed
  - type: horizontal-stack
    cards:
      - type: custom:mushroom-cover-card
        entity: cover.bed_rob
        show_tilt_position_control: false
        show_buttons_control: true
        tap_action: { action: none }
        hold_action: { action: none }
        double_tap_action: { action: none }
        secondary_info: none
        fill_container: false
        layout: horizontal
      - type: custom:mod-card
        style:
          hui-grid-card$: "div#root {\n  display: grid;\n  grid-template-columns: min-content max-content;\n}\n"
          hui-grid-card$ mushroom-entity-card$: "ha-card {\n  border: unset;\n  background: unset;\n  --icon-primary-color: var(--primary-text-color);\n  --grip-card-gap: 0;\n}\n"
        card:
          type: grid
          square: false
          columns: 2
          cards:
            - type: custom:mushroom-entity-card
              entity: cover.bed_rob
              name: Lezen
              primary_info: none
              secondary_info: none
              icon: mdi:book-alphabet
              tap_action:
                action: call-service
                service: script.auping_bed
                data: { cbu: 2, motor_1_action: 0, motor_1_time: 0, motor_2_action: 1, motor_2_time: 14000, motor_3_action: 0, motor_3_time: 0 }
            - type: custom:mushroom-entity-card
              entity: cover.bed_rob
              name: TV kijken
              primary_info: none
              secondary_info: none
              icon: mdi:television-classic
              tap_action:
                action: call-service
                service: script.auping_bed
                data: { cbu: 2, motor_1_action: 0, motor_1_time: 0, motor_2_action: 1, motor_2_time: 17000, motor_3_action: 0, motor_3_time: 0 }
  # ── aanwezigheid ──────────────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: Aanwezigheid
  - type: grid
    columns: 3
    square: false
    cards:
      - type: custom:bubble-card
        card_type: button
        button_type: state
        entity: device_tracker.iphonedetect_rob
        name: Router
        icon: mdi:wifi
        card_layout: large
        tap_action: { action: more-info }
        styles: |
          .bubble-button-background { opacity: 1 !important; background-color: ${state === 'home' ? 'rgba(55,138,221,0.16)' : 'rgba(255,255,255,0.04)'} !important; }
          .bubble-icon-container { background-color: ${state === 'home' ? 'rgba(55,138,221,0.22)' : 'rgba(255,255,255,0.07)'} !important; }
          .bubble-state { font-size: 0 !important; }
          .bubble-state::after { font-size: 12.5px !important; color: ${state === 'home' ? '#7db8ec' : '#8f8e9e'} !important; content: "${state === 'home' ? 'thuis' : 'weg'}"; }
      - type: custom:bubble-card
        card_type: button
        button_type: state
        entity: device_tracker.icloud_iphone_rob
        name: iCloud
        icon: mdi:apple
        card_layout: large
        tap_action: { action: more-info }
        styles: |
          .bubble-button-background { opacity: 1 !important; background-color: ${state === 'home' ? 'rgba(55,138,221,0.16)' : 'rgba(255,255,255,0.04)'} !important; }
          .bubble-icon-container { background-color: ${state === 'home' ? 'rgba(55,138,221,0.22)' : 'rgba(255,255,255,0.07)'} !important; }
          .bubble-state { font-size: 0 !important; }
          .bubble-state::after { font-size: 12.5px !important; color: ${state === 'home' ? '#7db8ec' : '#8f8e9e'} !important; content: "${state === 'home' ? 'thuis' : 'weg'}"; }
      - type: custom:bubble-card
        card_type: button
        button_type: state
        entity: device_tracker.iphone_rob
        name: GPS
        icon: mdi:cellphone
        card_layout: large
        tap_action: { action: more-info }
        styles: |
          .bubble-button-background { opacity: 1 !important; background-color: ${state === 'home' ? 'rgba(55,138,221,0.16)' : 'rgba(255,255,255,0.04)'} !important; }
          .bubble-icon-container { background-color: ${state === 'home' ? 'rgba(55,138,221,0.22)' : 'rgba(255,255,255,0.07)'} !important; }
          .bubble-state { font-size: 0 !important; }
          .bubble-state::after { font-size: 12.5px !important; color: ${state === 'home' ? '#7db8ec' : '#8f8e9e'} !important; content: "${state === 'home' ? 'thuis' : 'weg'}"; }
  # ── kaart ─────────────────────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: Kaart
  - type: map
    default_zoom: 16
    dark_mode: true
    hours_to_show: 12
    entities:
      - person.rob
    card_mod:
      style:
        .: "#root {\n  height: 22em;\n  padding-bottom: 0 !important;\n}\nha-icon-button {\n  color: var(--primary-color);\n  zoom: 140%;\n  margin-left: -0.2em;\n}\nha-card {\n  border-radius: 22px;\n  transition: none;\n  height: 22em !important;\n}\n"
        ha-map$: "#map {\n  background-color: #191919 !important;\n}\n.leaflet-control-attribution {\n  display: none;\n}\n.leaflet-bar a {\n  background-color: rgba(115, 123, 124, 0.2) !important;\n  color: #9da0a2 !important;\n  backdrop-filter: blur(0.25em);\n  zoom: 140%;\n}\n.leaflet-pane.leaflet-tile-pane {\n  filter: invert(0.95) grayscale(0.95) contrast(95%);\n}"
  # ── verloop ───────────────────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: Verloop
  - type: history-graph
    title: Apparaten (12 uur)
    hours_to_show: 12
    entities:
      - device_tracker.iphone_rob
      - device_tracker.icloud_iphone_rob
      - device_tracker.iphonedetect_rob
      - device_tracker.apple_watch_rob
