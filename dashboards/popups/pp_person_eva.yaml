action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    type: custom:popup-card
    initial_style: wide
    title: Eva
    timeout: 120000
    content:
      type: custom:advanced-camera-card
      dimensions:
        aspect_ratio_mode: unconstrained
      view:
        default: live
      menu:
        buttons:
          frigate:
            enabled: false
          timeline:
            enabled: true
          clips:
            enabled: true
          recordings:
            enabled: true
          snapshots:
            enabled: false
          camera_ui:
            enabled: true
          fullscreen:
            enabled: true
          media_player:
            enabled: false
        style: overlay
        position: top
      cameras:
        - camera_entity: camera.evabed
          # live_provider: ha
          # frigate:
          #   camera_name: Eva
      timeline:
        window_seconds: 3600
        events_media_type: all
        show_recordings: true
        controls:
          thumbnails:
            mode: below
          # next_previous:
          #   style: chevrons
      media_viewer:
        controls:
          thumbnails:
            mode: below
          next_previous:
            style: chevrons
