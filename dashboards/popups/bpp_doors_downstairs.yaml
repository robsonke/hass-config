# Bubble Card native pop-up (hash #deuren-beneden) — Deuren tile (Beneden).
# State-card grid pattern — see docs/superpowers/specs/2026-07-22-popup-modernization-doors-design.md
type: custom:bubble-card
card_type: pop-up
popup_mode: centered
full_width_on_mobile: true
width_desktop: 760px
hash: '#deuren-beneden'
name: Deuren en ramen beneden
icon: mdi:door
# summary in the header: group sensor drives the state line, overridden to
# the computed "N open · M dicht" count (blue = iets open, green = alles dicht).
entity: binary_sensor.doors_and_windows_downstairs
show_state: true
styles: |
  /* header summary counts/tints from the SAME entities shown as cards (the
     group sensor excludes interior doors, so it would disagree with the cards) */
  .bubble-button-background { opacity: 1 !important; background-color: ${['binary_sensor.frontdoor_openclose_contact','binary_sensor.backdoor_sensor_contact','binary_sensor.door_terrace_sensor_contact','binary_sensor.windowdoor_ground_1_openclose_contact','binary_sensor.windowdoor_ground_2_openclose_contact','binary_sensor.windowdoor_ground_3_openclose_contact','binary_sensor.hallwaydoor_sensor_contact','binary_sensor.window_office_openclose_contact','binary_sensor.door_hallcloset_openclose_contact','binary_sensor.toiletdoordownstairs_sensor_contact'].some(e => hass.states[e]?.state === 'on') ? 'rgba(55,138,221,0.16)' : 'rgba(45,170,115,0.13)'} !important; }
  .bubble-icon-container { background-color: ${['binary_sensor.frontdoor_openclose_contact','binary_sensor.backdoor_sensor_contact','binary_sensor.door_terrace_sensor_contact','binary_sensor.windowdoor_ground_1_openclose_contact','binary_sensor.windowdoor_ground_2_openclose_contact','binary_sensor.windowdoor_ground_3_openclose_contact','binary_sensor.hallwaydoor_sensor_contact','binary_sensor.window_office_openclose_contact','binary_sensor.door_hallcloset_openclose_contact','binary_sensor.toiletdoordownstairs_sensor_contact'].some(e => hass.states[e]?.state === 'on') ? 'rgba(55,138,221,0.22)' : 'rgba(45,170,115,0.20)'} !important; }
  .bubble-state { font-size: 0 !important; }
  .bubble-state::after {
    font-size: 14px !important; font-weight: 500;
    color: ${['binary_sensor.frontdoor_openclose_contact','binary_sensor.backdoor_sensor_contact','binary_sensor.door_terrace_sensor_contact','binary_sensor.windowdoor_ground_1_openclose_contact','binary_sensor.windowdoor_ground_2_openclose_contact','binary_sensor.windowdoor_ground_3_openclose_contact','binary_sensor.hallwaydoor_sensor_contact','binary_sensor.window_office_openclose_contact','binary_sensor.door_hallcloset_openclose_contact','binary_sensor.toiletdoordownstairs_sensor_contact'].some(e => hass.states[e]?.state === 'on') ? '#82bbf0' : '#9ed9bd'} !important;
    content: "${(() => { const m = ['binary_sensor.frontdoor_openclose_contact','binary_sensor.backdoor_sensor_contact','binary_sensor.door_terrace_sensor_contact','binary_sensor.windowdoor_ground_1_openclose_contact','binary_sensor.windowdoor_ground_2_openclose_contact','binary_sensor.windowdoor_ground_3_openclose_contact','binary_sensor.hallwaydoor_sensor_contact','binary_sensor.window_office_openclose_contact','binary_sensor.door_hallcloset_openclose_contact','binary_sensor.toiletdoordownstairs_sensor_contact']; const o = m.filter(e => hass.states[e]?.state === 'on').length; return o === 0 ? 'Alles dicht' : o + ' open · ' + (m.length - o) + ' dicht'; })()}";
  }
cards:
  # ── section: Buitendeuren ─────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: Buitendeuren
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:bubble-card
        card_type: button
        button_type: state
        entity: binary_sensor.frontdoor_openclose_contact
        name: Voordeur
        card_layout: large
        tap_action: { action: more-info }
        button_action:
          tap_action: { action: more-info }
        styles: |
          .bubble-button-background { opacity: 1 !important; background-color: ${state === 'on' ? 'rgba(55,138,221,0.16)' : 'rgba(45,170,115,0.13)'} !important; }
          .bubble-icon-container { background-color: ${state === 'on' ? 'rgba(55,138,221,0.22)' : 'rgba(45,170,115,0.20)'} !important; }
          .bubble-state { font-size: 0 !important; }
          .bubble-state::after { font-size: 12.5px !important; color: ${state === 'on' ? '#7db8ec' : '#8fbda6'} !important; content: "${(() => { const w = state === 'on' ? 'open' : 'dicht'; const t = hass.states['binary_sensor.frontdoor_openclose_contact']?.last_changed; const s = (Date.now() - new Date(t)) / 1000; let d; if (s < 60) d = 'net'; else if (s < 3600) { const m = Math.round(s/60); d = m >= 60 ? '1 uur' : m + ' min'; } else if (s < 86400) { const h = Math.round(s/3600); d = h >= 24 ? '1 dag' : h + ' uur'; } else { const dy = Math.round(s/86400); d = dy + (dy === 1 ? ' dag' : ' dagen'); } return w + ' · ' + d; })()}"; }
      - type: custom:bubble-card
        card_type: button
        button_type: state
        entity: binary_sensor.backdoor_sensor_contact
        name: Achterdeur
        card_layout: large
        tap_action: { action: more-info }
