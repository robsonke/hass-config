# Bubble Card native pop-up (hash #energie) — Energie verbruik, opbrengst, tarieven.
type: custom:bubble-card
card_type: pop-up
buttons_position: left
popup_mode: centered
full_width_on_mobile: true
width_desktop: 920px
hash: '#energie'
name: Energie verbruik en kosten
icon: mdi:flash
# header = actueel netto vermogen (amber = van net, groen = teruglevering) + prijs
entity: sensor.net_power_consumption
show_state: true
styles: |
  .bubble-button-background { opacity: 1 !important; background-color: ${(() => { const v = parseFloat(hass.states['sensor.net_power_consumption']?.state); return (isFinite(v) && v > 0.05) ? 'rgba(240,195,95,0.13)' : 'rgba(45,170,115,0.14)'; })()} !important; }
  .bubble-icon-container { background-color: ${(() => { const v = parseFloat(hass.states['sensor.net_power_consumption']?.state); return (isFinite(v) && v > 0.05) ? 'rgba(240,195,95,0.20)' : 'rgba(45,170,115,0.20)'; })()} !important; }
  .bubble-state { font-size: 0 !important; }
  .bubble-state::after {
    font-size: 14px !important; font-weight: 500;
    color: ${(() => { const v = parseFloat(hass.states['sensor.net_power_consumption']?.state); return (isFinite(v) && v > 0.05) ? '#f0cf8f' : '#9ed9bd'; })()} !important;
    content: "${(() => { const v = parseFloat(hass.states['sensor.net_power_consumption']?.state); const p = parseFloat(hass.states['sensor.current_price_electricity']?.state); let o = isFinite(v) ? (v > 0.05 ? v.toFixed(1).replace('.', ',') + ' kW' : (v < -0.05 ? Math.abs(v).toFixed(1).replace('.', ',') + ' kW terug' : '0 kW')) : '—'; if (isFinite(p)) o += ' · €' + p.toFixed(2).replace('.', ','); return o; })()}";
  }
cards:
  # ── energiestroom ─────────────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: Energiestroom
  - type: custom:power-flow-card-plus
    entities:
      grid:
        entity:
          consumption: sensor.power_consumed
          production: sensor.power_produced
        invert_state: false
        use_metadata: false
        color_value: true
      solar:
        entity: sensor.solaredge_dc_power
        display_zero_state: true
      home:
        entity: sensor.net_power_consumption
      fossil_fuel_percentage:
        entity: sensor.grid_fossil_fuel_percentage
        icon: mdi:pine-tree
        color_icon: true
        display_zero: true
        name: Non Fossil
        state_type: power
      individual:
        - entity: sensor.ehhatdgg_power
          icon: mdi:car-electric
          color: '#80b8ff'
          name: BMW
          color_icon: false
          display_zero: true
          display_zero_state: false
          calculate_flow_rate: false
          inverted_animation: false
          show_direction: false
          use_metadata: true
          unit_white_space: false
          secondary_info:
            entity: sensor.ix3_remaining_battery_percent
            unit_of_measurement: '%'
            icon: mdi:ev-station
        - entity: sensor.shelly_warmtepomp_meter_total_active_power
          icon: mdi:heat-pump
          color_value: false
          color_icon: true
          display_zero_state: false
          calculate_flow_rate: false
          inverted_animation: false
          show_direction: false
          use_metadata: true
          name: Warmtepomp
      battery: {}
    clickable_entities: true
    display_zero_lines:
      mode: show
      transparency: 50
      grey_color:
        - 189
        - 189
        - 189
    use_new_flow_rate_model: true
    w_decimals: 0
    kw_decimals: 1
    min_flow_rate: 0.75
    max_flow_rate: 6
    max_expected_power: 12000
    min_expected_power: 0.01
    watt_threshold: 1000
    transparency_zero_lines: 0
    disable_dots: false
  # ── vermogen nu ───────────────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: Vermogen nu
  - type: horizontal-stack
    cards:
      - type: gauge
        name: Verbruik
        unit: kW
        entity: sensor.net_power_consumption
        min: 0
        needle: true
        severity:
          green: 0
          yellow: 3
          red: 8
        max: 20
      - type: gauge
        name: Productie
        unit: kW
        entity: sensor.solaredge_dc_power
        min: 0
        needle: true
        severity:
          green: 0
          yellow: 4
          red: 8
        max: 12
  - type: custom:bar-card
    entities:
      - sensor.current_phase_1
      - sensor.current_phase_2
      - sensor.current_phase_3
    title: Fasen
    direction: up
    max: 25
    height: 200px
    stack: horizontal
    severity:
      - color: Red
        from: 20
        to: 35
      - color: Orange
        from: 15
        to: 20
      - color: Green
        from: 0
        to: 15
  # ── zonopbrengst ──────────────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: Zonopbrengst
  - type: custom:apexcharts-card
    header:
      title: Solar forecast
      show: true
      show_states: true
      colorize_states: true
    apex_config:
      chart:
        height: 300px
      tooltip:
        enabled: true
        shared: true
        followCursor: true
    graph_span: 24h
    span:
      start: day
    yaxis:
      - id: capacity
        show: true
        opposite: true
        decimals: 0
        max: 100
        min: 0
        apex_config:
          tickAmount: 10
      - id: kWh
        show: true
        min: 0
        apex_config:
          tickAmount: 10
      - id: header_only
        show: false
    series:
      - entity: sensor.solcast_pv_forecast_power_now
        name: Solar Power (now)
        type: line
        stroke_width: 2
        float_precision: 2
        color: Orange
        yaxis_id: kWh
        unit: kW
        extend_to: now
        show:
          legend_value: true
          in_header: false
        group_by:
          func: avg
          duration: 5m
      - entity: sensor.solcast_pv_forecast_forecast_today
        name: Forecast
        color: Grey
        opacity: 0.3
        stroke_width: 0
        type: area
        time_delta: +15min
        extend_to: false
        yaxis_id: kWh
        show:
          legend_value: false
          in_header: false
        data_generator: |
          return entity.attributes.detailedForecast.map((entry) => {
                return [new Date(entry.period_start), entry.pv_estimate];
              });
      - entity: sensor.solcast_pv_forecast_forecast_today
        name: Forecast 10%
        color: Grey
        opacity: 0.3
        stroke_width: 0
        type: area
        time_delta: +15min
        extend_to: false
        yaxis_id: kWh
        show:
          legend_value: false
          in_header: false
        data_generator: |
          return entity.attributes.detailedForecast.map((entry) => {
                return [new Date(entry.period_start), entry.pv_estimate10];
              });
      - entity: sensor.solaredge_energy_today
        yaxis_id: header_only
        name: Today Actual
        stroke_width: 2
        color: Orange
        show:
          legend_value: true
          in_header: true
          in_chart: false
      - entity: sensor.solcast_pv_forecast_forecast_today
        yaxis_id: header_only
        name: Today Forecast
        color: Grey
        show:
          legend_value: true
          in_header: true
          in_chart: false
      - entity: sensor.solcast_pv_forecast_forecast_today
        attribute: estimate10
        yaxis_id: header_only
        name: Today Forecast 10%
        color: Grey
        opacity: 0.3
        show:
          legend_value: true
          in_header: true
          in_chart: false
      - entity: sensor.solcast_pv_forecast_forecast_remaining_today
        yaxis_id: header_only
        name: Remaining
        color: Grey
        show:
          legend_value: true
          in_header: true
          in_chart: false
  # ── verbruik & productie ──────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: Verbruik & productie
  - type: energy-usage-graph
  - type: energy-devices-detail-graph
    max_devices: 5
  - type: entities
    title: Energie totalen
    state_color: false
    entities:
      - entity: sensor.power_consumed
      - entity: sensor.daily_consumption_energy
        name: Power Consumption Today
        icon: mdi:counter
      - entity: sensor.solaredge_energy_today
        name: Power Production Today
      - entity: sensor.monthly_consumption_energy
        name: Power Consumption this Month
      - entity: sensor.solaredge_energy_this_month
        name: Power Production this Month
      - entity: sensor.yearly_consumption_energy
        name: Power Consumption this Year
      - entity: sensor.solaredge_energy_this_year
        name: Power Production this Year
  # ── tarieven ──────────────────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: Tarieven
  - type: entities
    title: Tarieven vandaag en morgen
    entities:
      - entity: sensor.average_price_today
        name: Gemiddeld kWh prijs vandaag
      - entity: sensor.average_price_tomorrow
        name: Gemiddeld kWh prijs morgen
  - type: custom:apexcharts-card
    experimental:
      color_threshold: true
    graph_span: 1d
    span:
      start: day
    apex_config:
      chart:
        height: 250px
    series:
      - entity: sensor.nordpool_kwh_nl_eur_3_10_021
        data_generator: |
          return entity.attributes.raw_today.map((entry) => {
            let value = (entry.value + (0.1108));
            return [new Date(entry.start), value];
          });
        type: column
        float_precision: 2
        show:
          extremas: true
        color_threshold:
          - value: 0
            color: blue
          - value: 0.15
            color: green
          - value: 0.35
            color: darkorange
          - value: 0.40
            color: red
          - value: 0.50
            color: darkred
          - value: 0.60
            color: black
    now:
      show: true
      color: '#ff0000'
    yaxis:
      - min: 0
        decimals: 2
  - type: custom:apexcharts-card
    experimental:
      color_threshold: true
    apex_config:
      chart:
        height: 300px
    graph_span: 1d
    span:
      start: day
      offset: +1d
    series:
      - entity: sensor.nordpool_kwh_nl_eur_3_10_021
        data_generator: |
          let hour = new Date().getHours();
          if (hour >= 13) {
            return entity.attributes.raw_tomorrow.map((entry) => {
              let value = (entry.value + (0.1108));
              return [new Date(entry.start), value];
            });
          }
          else return [new Date(), 0];
        type: column
        float_precision: 2
        show:
          extremas: true
        color_threshold:
          - value: 0
            color: blue
          - value: 0.15
            color: green
          - value: 0.35
            color: darkorange
          - value: 0.40
            color: red
          - value: 0.50
            color: darkred
          - value: 0.60
            color: black
    yaxis:
      - min: 0
        decimals: 2
  - type: energy-sources-table
  - type: energy-date-selection
