action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    type: custom:popup-card
    initial_style: wide
    title: Verlichting boven
    timeout: 60000
    content:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        grid-template-columns: 1fr 1fr
        grid-template-rows: auto
        grid-template-areas: |
          "part1 part2"
        mediaquery:
          "(max-width: 800px)":
            grid-template-columns: auto
            grid-template-rows: auto
            grid-template-areas: |
              "part1"
              "part2"
      cards:
        - type: entities
          view_layout:
            grid-area: part1
          entities:
            - type: custom:decluttering-card
              template: light_button
              variables:
                - entity: light.dimmer_corridor
                - title: Overloop
            - type: custom:decluttering-card
              template: light_button
              variables:
                - entity: light.toilet_upstairs_light
                - title: Toilet

            - type: divider

            - type: custom:decluttering-card
              template: light_button
              variables:
                - entity: light.bedroom_sonos_light
                - title: Bedlamp Sonos
            - type: custom:decluttering-card
              template: light_button
              variables:
                - entity: light.dimmer_masterbed
                - title: Slaapkamer
            - type: custom:decluttering-card
              template: light_button
              variables:
                - entity: light.dimmer_mastercloset
                - title: Inloopkast
            - type: custom:decluttering-card
              template: light_button
              variables:
                - entity: light.dimmer_masterbath
                - title: Douche

        - type: entities
          view_layout:
            grid-area: part2
          entities:
            - type: custom:decluttering-card
              template: light_button
              variables:
                - entity: light.dimmer_eva
                - title: Eva
            - type: custom:decluttering-card
              template: light_button
              variables:
                - entity: light.dimmer_bathroom
                - title: Badkamer
            - type: custom:decluttering-card
              template: light_button
              variables:
                - entity: light.dimmer_noa
                - title: Noa
            - type: custom:decluttering-card
              template: light_button
              variables:
                - entity: light.dimmer_guestroom
                - title: Logeerkamer
