# Bubble Card native pop-up (hash #verlichting-tuin) — Verlichting light sliders.
# Light slider cards (drag = brightness, tap = toggle, colour = light's own rgb);
# on/off-only lights are plain toggle cards. See the popup-modernization spec.
type: custom:bubble-card
card_type: pop-up
popup_mode: centered
full_width_on_mobile: true
width_desktop: 1000px
hash: '#verlichting-tuin'
name: Tuin verlichting
icon: mdi:lightbulb-group
entity: light.garden_light
show_state: true
styles: |
  .bubble-button-background { opacity: 1 !important; background-color: ${['light.roofceiling_garden_light','light.roofceiling_table_light','light.lights_wall_shed','light.veranda_light','light.shed_light_back','light.garden_light','light.woodshed_light','light.pool_terrace_light1','light.pool_terrace_light2','light.palm1_light','light.palm2_light','light.garden_lantern_light1','light.garden_lantern_light2','light.garden_lantern_light3','light.hue_lily_light_fence_1','light.hue_lily_light_fence_2','light.hue_lily_light_fence_3','light.hue_lily_light_tree_1','light.hue_lily_light_tree_2'].some(e => hass.states[e]?.state === 'on') ? 'rgba(240,195,95,0.13)' : 'rgba(255,255,255,0.04)'} !important; }
  .bubble-icon-container { background-color: ${['light.roofceiling_garden_light','light.roofceiling_table_light','light.lights_wall_shed','light.veranda_light','light.shed_light_back','light.garden_light','light.woodshed_light','light.pool_terrace_light1','light.pool_terrace_light2','light.palm1_light','light.palm2_light','light.garden_lantern_light1','light.garden_lantern_light2','light.garden_lantern_light3','light.hue_lily_light_fence_1','light.hue_lily_light_fence_2','light.hue_lily_light_fence_3','light.hue_lily_light_tree_1','light.hue_lily_light_tree_2'].some(e => hass.states[e]?.state === 'on') ? 'rgba(240,195,95,0.20)' : 'rgba(255,255,255,0.07)'} !important; }
  .bubble-state { font-size: 0 !important; }
  .bubble-state::after {
    font-size: 14px !important; font-weight: 500;
    color: ${['light.roofceiling_garden_light','light.roofceiling_table_light','light.lights_wall_shed','light.veranda_light','light.shed_light_back','light.garden_light','light.woodshed_light','light.pool_terrace_light1','light.pool_terrace_light2','light.palm1_light','light.palm2_light','light.garden_lantern_light1','light.garden_lantern_light2','light.garden_lantern_light3','light.hue_lily_light_fence_1','light.hue_lily_light_fence_2','light.hue_lily_light_fence_3','light.hue_lily_light_tree_1','light.hue_lily_light_tree_2'].some(e => hass.states[e]?.state === 'on') ? '#f0cf8f' : '#9b9aac'} !important;
    content: "${(() => { const m = ['light.roofceiling_garden_light','light.roofceiling_table_light','light.lights_wall_shed','light.veranda_light','light.shed_light_back','light.garden_light','light.woodshed_light','light.pool_terrace_light1','light.pool_terrace_light2','light.palm1_light','light.palm2_light','light.garden_lantern_light1','light.garden_lantern_light2','light.garden_lantern_light3','light.hue_lily_light_fence_1','light.hue_lily_light_fence_2','light.hue_lily_light_fence_3','light.hue_lily_light_tree_1','light.hue_lily_light_tree_2']; const o = m.filter(e => hass.states[e]?.state === 'on').length; return o === 0 ? 'Alles uit' : o + ' aan · ' + (m.length - o) + ' uit'; })()}";
  }
cards:
  - type: custom:bubble-card
    card_type: separator
    name: Overkapping
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:bubble-card
        card_type: button
        button_type: slider
        entity: light.roofceiling_garden_light
        name: Overkapping Spots
        card_layout: large
        slider_live_update: true
        tap_action: { action: toggle }
        double_tap_action: { action: more-info }
        hold_action: { action: more-info }
      - type: custom:bubble-card
        card_type: button
        button_type: slider
        entity: light.roofceiling_table_light
        name: Overkapping Tafel
        card_layout: large
        slider_live_update: true
        tap_action: { action: toggle }
        double_tap_action: { action: more-info }
        hold_action: { action: more-info }
      - type: custom:bubble-card
        card_type: button
        button_type: slider
        entity: light.lights_wall_shed
        name: Overkapping Wand
        card_layout: large
        slider_live_update: true
        tap_action: { action: toggle }
        double_tap_action: { action: more-info }
        hold_action: { action: more-info }
      - type: custom:bubble-card
        card_type: button
        button_type: slider
        entity: light.veranda_light
        name: Blokhut Spots
        card_layout: large
        slider_live_update: true
        tap_action: { action: toggle }
        double_tap_action: { action: more-info }
        hold_action: { action: more-info }
      - type: custom:bubble-card
        card_type: button
        button_type: state
        entity: light.shed_light_back
        name: Schuur Achter
        card_layout: large
        tap_action: { action: toggle }
        hold_action: { action: more-info }
        styles: |
          .bubble-button-background { opacity: 1 !important; background-color: ${state === 'on' ? 'rgba(240,195,95,0.14)' : 'rgba(255,255,255,0.04)'} !important; }
          .bubble-icon-container { background-color: ${state === 'on' ? 'rgba(240,195,95,0.20)' : 'rgba(255,255,255,0.07)'} !important; }
          .bubble-state { font-size: 0 !important; }
          .bubble-state::after { font-size: 12.5px !important; color: ${state === 'on' ? '#f0cf8f' : '#8f8e9e'} !important; content: "${state === 'on' ? 'aan' : 'uit'}"; }
