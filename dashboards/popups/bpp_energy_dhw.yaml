# Bubble Card native pop-up (hash #warm-water) — Warm water (Altherma DHW tank).
type: custom:bubble-card
card_type: pop-up
buttons_position: left
popup_mode: centered
full_width_on_mobile: true
width_desktop: 760px
hash: '#warm-water'
name: Warm water
icon: mdi:water-boiler
# header = watertemp + modus (warm = aan/performance, dim = uit)
entity: water_heater.domestic_hot_water_tank
show_state: true
styles: |
  .bubble-button-background { opacity: 1 !important; background-color: ${state === 'off' ? 'rgba(255,255,255,0.04)' : 'rgba(240,195,95,0.13)'} !important; }
  .bubble-icon-container { background-color: ${state === 'off' ? 'rgba(255,255,255,0.07)' : 'rgba(240,195,95,0.20)'} !important; }
  .bubble-state { font-size: 0 !important; }
  .bubble-state::after {
    font-size: 14px !important; font-weight: 500;
    color: ${state === 'off' ? '#9b9aac' : '#f0cf8f'} !important;
    content: "${(() => { const a = hass.states['water_heater.domestic_hot_water_tank']?.attributes; const t = a?.current_temperature; const m = ({on:'Aan', off:'Uit', performance:'Max'})[a?.operation_mode] || a?.operation_mode || ''; return (t != null ? Math.round(t) + '°C' : '—') + (m ? ' · ' + m : ''); })()}";
  }
cards:
  # ── boiler ────────────────────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: Boiler
  - type: tile
    entity: water_heater.domestic_hot_water_tank
    features:
      - type: water-heater-operation-modes
        operation_modes:
          - "on"
          - performance
          - "off"
  # ── temperatuur ───────────────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: Temperatuur
  - type: custom:mini-graph-card
    entities:
      - entity: water_heater.domestic_hot_water_tank
        attribute: current_temperature
        name: Water
        color: '#e74c3c'
      - entity: water_heater.domestic_hot_water_tank
        attribute: temperature
        name: Gewenst
        color: white
    show:
      labels: true
    hour24: true
    hours_to_show: 12
    line_width: 2
    color_thresholds:
      - value: 30
        color: '#f39c12'
      - value: 40
        color: '#d35400'
      - value: 50
        color: '#c0392b'
  # ── warmtepomp ────────────────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: Warmtepomp
  - type: history-graph
    hours_to_show: 12
    refresh_interval: 30
    entities:
      - entity: sensor.altherma_operation_mode
        name: Modus
  # ── activiteit ────────────────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: Activiteit
  - type: logbook
    entities:
      - water_heater.domestic_hot_water_tank
    hours_to_show: 12
