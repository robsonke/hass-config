# Bubble Card native pop-up (hash #zwembad) — Zwembad tile (Tuin).
# Deck cover + lock, pool light, filterpomp, water values, heat pump climate,
# energy, automation toggle, camera. See the popup-modernization spec.
type: custom:bubble-card
card_type: pop-up
popup_mode: centered
full_width_on_mobile: true
width_desktop: 920px
hash: '#zwembad'
name: Zwembad
icon: mdi:pool
# header = watertemp + warmtepompstatus (warm = verwarmt, blauw = koelt)
entity: climate.fairland_zwembad_climate
show_state: true
styles: |
  .bubble-button-background { opacity: 1 !important; background-color: ${(() => { const s = hass.states['climate.fairland_zwembad_climate']?.state; return s === 'cool' ? 'rgba(55,138,221,0.16)' : s === 'heat' ? 'rgba(240,195,95,0.13)' : 'rgba(255,255,255,0.04)'; })()} !important; }
  .bubble-icon-container { background-color: ${(() => { const s = hass.states['climate.fairland_zwembad_climate']?.state; return s === 'cool' ? 'rgba(55,138,221,0.22)' : s === 'heat' ? 'rgba(240,195,95,0.20)' : 'rgba(255,255,255,0.07)'; })()} !important; }
  .bubble-state { font-size: 0 !important; }
  .bubble-state::after {
    font-size: 14px !important; font-weight: 500;
    color: ${(() => { const s = hass.states['climate.fairland_zwembad_climate']?.state; return s === 'cool' ? '#82bbf0' : s === 'heat' ? '#f0cf8f' : '#9ed9bd'; })()} !important;
    content: "${(() => { const c = hass.states['climate.fairland_zwembad_climate']; const t = parseFloat(c?.attributes?.current_temperature); const tgt = parseFloat(c?.attributes?.temperature); const s = c?.state; let o = 'Water ' + (isFinite(t) ? t.toFixed(1).replace('.', ',') + '°C' : '—'); if ((s === 'heat' || s === 'cool' || s === 'auto') && isFinite(tgt)) o += ' · doel ' + Math.round(tgt) + '°'; return o; })()}";
  }
cards:
  # ── rol dek ───────────────────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: Rol dek
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:bubble-card
        card_type: button
        button_type: slider
        entity: cover.pool_deck
        name: Dek
        icon: mdi:window-shutter
        card_layout: large
        slider_live_update: true
        tap_action: { action: toggle }
        hold_action: { action: more-info }
        sub_button:
          - icon: mdi:arrow-up
            tap_action: { action: perform-action, perform_action: cover.open_cover, target: { entity_id: cover.pool_deck } }
            show_background: true
          - icon: mdi:stop
            tap_action: { action: perform-action, perform_action: cover.stop_cover, target: { entity_id: cover.pool_deck } }
            show_background: true
          - icon: mdi:arrow-down
            tap_action: { action: perform-action, perform_action: cover.close_cover, target: { entity_id: cover.pool_deck } }
            show_background: true
        styles: |
          .bubble-state { font-size: 0 !important; }
          .bubble-state::after { font-size: 12.5px !important; color: ${state === 'open' ? '#7db8ec' : '#8fbda6'} !important; content: "${(() => { const p = hass.states['cover.pool_deck']?.attributes?.current_position; return p == null ? '' : (p >= 100 ? 'open' : (p <= 0 ? 'dicht' : p + '%')); })()}"; }
      - type: custom:bubble-card
        card_type: button
        button_type: state
        entity: lock.aquadeck_rol_dek
        name: Slot
        card_layout: large
        tap_action: { action: toggle }
        hold_action: { action: more-info }
        styles: |
          .bubble-button-background { opacity: 1 !important; background-color: ${state === 'locked' ? 'rgba(45,170,115,0.13)' : 'rgba(255,255,255,0.04)'} !important; }
          .bubble-icon-container { background-color: ${state === 'locked' ? 'rgba(45,170,115,0.20)' : 'rgba(255,255,255,0.07)'} !important; }
          .bubble-state { font-size: 0 !important; }
          .bubble-state::after { font-size: 12.5px !important; color: ${state === 'locked' ? '#9ed9bd' : '#8f8e9e'} !important; content: "${state === 'locked' ? 'Vergrendeld' : 'Ontgrendeld'}"; }
  # ── verlichting ───────────────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: Verlichting
  - type: custom:bubble-card
    card_type: button
    button_type: slider
    entity: light.pool_light
    name: Zwembadverlichting
    card_layout: large
    slider_live_update: true
    tap_action: { action: toggle }
    double_tap_action: { action: more-info }
    hold_action: { action: more-info }
    sub_button:
      - icon: mdi:palette
        tap_action: { action: more-info }
        show_background: true
  # ── filterpomp ────────────────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: Filterpomp
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:bubble-card
        card_type: button
        button_type: state
        entity: switch.pool_pomp_switch
        name: Filterpomp
        icon: mdi:pump
        card_layout: large
        tap_action: { action: toggle }
        hold_action: { action: more-info }
        styles: |
          .bubble-button-background { opacity: 1 !important; background-color: ${state === 'on' ? 'rgba(55,138,221,0.16)' : 'rgba(255,255,255,0.04)'} !important; }
          .bubble-icon-container { background-color: ${state === 'on' ? 'rgba(55,138,221,0.22)' : 'rgba(255,255,255,0.07)'} !important; }
          .bubble-state { font-size: 0 !important; }
          .bubble-state::after { font-size: 12.5px !important; color: ${state === 'on' ? '#7db8ec' : '#8f8e9e'} !important; content: "${(() => { if (hass.states['switch.pool_pomp_switch']?.state !== 'on') return 'uit'; const f = hass.states['sensor.pool_pump_frequency_level']?.state; return (f && f !== 'unknown' && f !== 'unavailable') ? f + ' Hz' : 'aan'; })()}"; }
      - type: custom:bubble-card
        card_type: button
        button_type: state
        entity: binary_sensor.pool_pump_active
        name: Flow
        icon: mdi:waves
        card_layout: large
        tap_action: { action: more-info }
        styles: |
          .bubble-button-background { opacity: 1 !important; background-color: ${state === 'on' ? 'rgba(55,138,221,0.16)' : 'rgba(255,255,255,0.04)'} !important; }
          .bubble-icon-container { background-color: ${state === 'on' ? 'rgba(55,138,221,0.22)' : 'rgba(255,255,255,0.07)'} !important; }
          .bubble-state { font-size: 0 !important; }
          .bubble-state::after { font-size: 12.5px !important; color: ${state === 'on' ? '#7db8ec' : '#8f8e9e'} !important; content: "${state === 'on' ? 'Ja' : 'Nee'}"; }
  # ── water ─────────────────────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: Water
  - type: grid
    columns: 3
    square: false
    cards:
      - type: custom:bubble-card
        card_type: button
        button_type: state
        entity: sensor.fairland_zwembad_wpu_temp_inlet
        name: Temperatuur
        icon: mdi:pool-thermometer
        card_layout: large
        tap_action: { action: more-info }
        styles: |
          .bubble-button-background { opacity: 1 !important; background-color: ${(() => { const v = parseFloat(hass.states['sensor.fairland_zwembad_wpu_temp_inlet']?.state); return (isFinite(v) && v >= 25 && v <= 29) ? 'rgba(45,170,115,0.14)' : 'rgba(240,195,95,0.14)'; })()} !important; }
          .bubble-state { font-size: 0 !important; }
          .bubble-state::after { font-size: 13px !important; font-weight: 500; color: ${(() => { const v = parseFloat(hass.states['sensor.fairland_zwembad_wpu_temp_inlet']?.state); return (isFinite(v) && v >= 25 && v <= 29) ? '#9ed9bd' : '#f0cf8f'; })()} !important; content: "${(() => { const v = parseFloat(hass.states['sensor.fairland_zwembad_wpu_temp_inlet']?.state); return isFinite(v) ? v.toFixed(1).replace('.', ',') + ' °C' : '—'; })()}"; }
      - type: custom:bubble-card
        card_type: button
        button_type: state
        entity: sensor.eps_pool_ph_level
        name: pH
        icon: mdi:ph
        card_layout: large
        tap_action: { action: more-info }
        styles: |
          .bubble-button-background { opacity: 1 !important; background-color: ${(() => { const v = parseFloat(hass.states['sensor.eps_pool_ph_level']?.state); return (isFinite(v) && v >= 7.0 && v <= 7.4) ? 'rgba(45,170,115,0.14)' : 'rgba(240,195,95,0.14)'; })()} !important; }
          .bubble-state { font-size: 0 !important; }
          .bubble-state::after { font-size: 13px !important; font-weight: 500; color: ${(() => { const v = parseFloat(hass.states['sensor.eps_pool_ph_level']?.state); return (isFinite(v) && v >= 7.0 && v <= 7.4) ? '#9ed9bd' : '#f0cf8f'; })()} !important; content: "${(() => { const v = parseFloat(hass.states['sensor.eps_pool_ph_level']?.state); return isFinite(v) ? v.toFixed(1).replace('.', ',') : '—'; })()}"; }
      - type: custom:bubble-card
        card_type: button
        button_type: state
        entity: sensor.eps_pool_rx_level
        name: ORP
        icon: mdi:flash
        card_layout: large
        tap_action: { action: more-info }
        styles: |
          .bubble-button-background { opacity: 1 !important; background-color: ${(() => { const v = parseFloat(hass.states['sensor.eps_pool_rx_level']?.state); return (isFinite(v) && v >= 650 && v <= 750) ? 'rgba(45,170,115,0.14)' : 'rgba(240,195,95,0.14)'; })()} !important; }
          .bubble-state { font-size: 0 !important; }
          .bubble-state::after { font-size: 13px !important; font-weight: 500; color: ${(() => { const v = parseFloat(hass.states['sensor.eps_pool_rx_level']?.state); return (isFinite(v) && v >= 650 && v <= 750) ? '#9ed9bd' : '#f0cf8f'; })()} !important; content: "${(() => { const v = parseFloat(hass.states['sensor.eps_pool_rx_level']?.state); return isFinite(v) ? Math.round(v) + ' mV' : '—'; })()}"; }
  # ── warmtepomp ────────────────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: Warmtepomp
  - type: custom:bubble-card
    card_type: climate
    entity: climate.fairland_zwembad_climate
    name: Warmtepomp
    hold_action: { action: more-info }
  - type: custom:expander-card
    title: Warmtepomp instellingen
    cards:
      - type: entities
        show_header_toggle: false
        entities:
          - entity: switch.fairland_zwembad_wpu_aan_uit_schakelaar
            name: Warmtepomp aan/uit
          - entity: select.fairland_zwembad_wpu_power_mode
            name: Smart / Silent
          - entity: number.fairland_zwembad_wpu_target_temperature_heating
            name: Gewenste temperatuur
          - entity: select.fairland_zwembad_wpu_operating_mode
            name: Bedrijfsmodus
          - type: divider
          - entity: sensor.fairland_zwembad_wpu_temp_inlet
            name: Ingaande temperatuur
          - entity: sensor.fairland_zwembad_wpu_temp_outlet
            name: Uitgaande temperatuur
          - entity: sensor.fairland_zwembad_wpu_compressor_percent
            name: Vermogen warmtepomp
  # ── energie ───────────────────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: Energie
  - type: entities
    show_header_toggle: false
    entities:
      - entity: sensor.pool_shelly_3em_active_power_phase_b
        name: Pomp & roldek
      - entity: sensor.pool_shelly_3em_active_power_phase_a
        name: Warmtepomp
      - entity: sensor.pool_shelly_3em_active_power_phase_c
        name: Verlichting
  # ── aansturing ────────────────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: Aansturing
  - type: custom:bubble-card
    card_type: button
    button_type: switch
    entity: input_boolean.enable_pool_automations
    name: Automatische aansturing
    icon: mdi:cog-outline
    card_layout: large
  # ── camera ────────────────────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: Camera
  - type: custom:advanced-camera-card
    dimensions:
      aspect_ratio_mode: unconstrained
    view:
      default: live
    menu:
      buttons:
        frigate:
          enabled: false
        snapshots:
          enabled: true
        camera_ui:
          enabled: false
        fullscreen:
          enabled: true
        media_player:
          enabled: false
      style: overlay
      position: top
    timeline:
      window_seconds: 3600
      events_media_type: all
    cameras:
      - camera_entity: camera.zwembad
        live_provider: ha
        frigate:
          camera_name: Zwembad
        ptz:
          enabled: false
    media_viewer:
      controls:
        thumbnails:
          mode: below
        next_previous:
          style: chevrons
