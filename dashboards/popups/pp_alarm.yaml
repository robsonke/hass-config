action: fire-dom-event
browser_mod:
  service: browser_mod.popup
  data:
    type: custom:popup-card
    title: Alarm
    timeout: 60000
    initial_style: wide
    content:
      type: custom:layout-card
      layout_type: custom:grid-layout
      layout:
        grid-template-columns: auto auto
        grid-template-rows: auto
        grid-template-areas: |
          "details camera"
        mediaquery:
          "(max-width: 800px)":
            grid-template-columns: auto
            grid-template-rows: auto
            grid-template-areas: |
              "details"
              "camera"
      cards:
        - type: vertical-stack
          view_layout:
            grid-area: details
          cards:
            - type: custom:alarmo-card
              entity: alarm_control_panel.alarmo
            - type: custom:auto-entities
              card:
                type: entities
              filter:
                include:
                  - entity_id: lock.nuki_voordeur_slot_lock
            - type: tile
              entity: input_text.camera_analysis
              show_entity_picture: false
              name: Laatste gebeurtenis
              icon: mdi:camera
              hide_state: false
              vertical: false
              state_content:
                - state
                - last-changed
              tap_action:
                action: url
                url_path: /ccab4aaf_frigate/ingress

            - type: custom:auto-entities
              card:
                type: entities
                title: Recent geopende deuren en ramen
                show_header_toggle: false
                card_mod:
                  class: header
                  style: |
                    ha-card {
                      margin: 0px !important;
                    }
              filter:
                include:
                  - domain: binary_sensor
                    attributes:
                      device_class: door
                    options:
                      secondary_info: last-changed
                  - domain: binary_sensor
                    attributes:
                      device_class: window
                    options:
                      secondary_info: last-changed
                exclude:
                  - entity_id: binary_sensor.voordeur_slot
                  - entity_id: binary_sensor.doors_and_windows_upstairs
              show_empty: false
              unique: entity
              sort:
                method: last_changed
                count: 5
                reverse: true
        # wrap in grid to avoid layout issues with swipe card
        - type: grid
          view_layout:
            grid-area: camera
          columns: 1
          cards:
            - type: custom:advanced-camera-card
              dimensions:
                aspect_ratio_mode: unconstrained
              entities:
                - entity: binary_sensor.langeweide_doorbell_visitor
                - entity: binary_sensor.langeweide_doorbell_motion
                - entity: binary_sensor.langeweide_doorbell_person
              menu:
                buttons:
                  frigate:
                    enabled: false
                  image:
                    enabled: false
                  camera_ui:
                    enabled: false
                  media_player:
                    enabled: false
                style: overlay
                position: top
              view:
                default: live
              live:
                controls:
                  thumbnails:
                    mode: below
                    media: snapshots
              cameras:
                - camera_entity: camera.langeweide_doorbell_clear
                  live_provider: ha
                  frigate:
                    camera_name: Voordeur
              media_viewer:
                controls:
                  next_previous:
                    style: chevrons
