# Bubble Card native pop-up (hash #klimaat-boven) — Klimaat tile (Boven).
# Bubble climate card + warm toggle cards for aux heating + humidifier + graph.
# See docs/superpowers/specs/2026-07-22-popup-modernization-doors-design.md
type: custom:bubble-card
card_type: pop-up
popup_mode: centered
full_width_on_mobile: true
width_desktop: 1000px
hash: '#klimaat-boven'
name: Slaapkamers klimaat
icon: mdi:thermostat
# header = master-bedroom temp (always-available sensor) + warm when any heat source is on
entity: sensor.climate_sensor_masterbedroom_temperature
show_state: true
styles: |
  .bubble-button-background { opacity: 1 !important; background-color: ${(['switch.infrarood_eva','switch.infrarood_noa','switch.shelly_plug_badkamer_verwarming_relay','switch.shelly_plug_douche_verwarming_relay'].some(e => hass.states[e]?.state === 'on') || hass.states['climate.eurom_alutherm_baseboard_heater']?.state === 'heat') ? 'rgba(240,195,95,0.13)' : 'rgba(255,255,255,0.04)'} !important; }
  .bubble-icon-container { background-color: ${(['switch.infrarood_eva','switch.infrarood_noa','switch.shelly_plug_badkamer_verwarming_relay','switch.shelly_plug_douche_verwarming_relay'].some(e => hass.states[e]?.state === 'on') || hass.states['climate.eurom_alutherm_baseboard_heater']?.state === 'heat') ? 'rgba(240,195,95,0.20)' : 'rgba(255,255,255,0.07)'} !important; }
  .bubble-state { font-size: 0 !important; }
  .bubble-state::after {
    font-size: 14px !important; font-weight: 500;
    color: ${(['switch.infrarood_eva','switch.infrarood_noa','switch.shelly_plug_badkamer_verwarming_relay','switch.shelly_plug_douche_verwarming_relay'].some(e => hass.states[e]?.state === 'on') || hass.states['climate.eurom_alutherm_baseboard_heater']?.state === 'heat') ? '#f0cf8f' : '#9ed9bd'} !important;
    content: "${(() => { const t = parseFloat(hass.states['sensor.climate_sensor_masterbedroom_temperature']?.state); const tt = isFinite(t) ? t.toFixed(1).replace('.', ',') + '°C' : '—'; const heat = ['switch.infrarood_eva','switch.infrarood_noa','switch.shelly_plug_badkamer_verwarming_relay','switch.shelly_plug_douche_verwarming_relay'].some(e => hass.states[e]?.state === 'on') || hass.states['climate.eurom_alutherm_baseboard_heater']?.state === 'heat'; return 'Slaapkamer ' + tt + (heat ? ' · verwarmt' : ''); })()}";
  }
cards:
  # ── thermostaat ───────────────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: Slaapkamer kachel
  - type: custom:bubble-card
    card_type: climate
    entity: climate.eurom_alutherm_baseboard_heater
    name: Kachel
    hold_action: { action: more-info }
  # ── bijverwarming (warm toggle, verbruik als aan) ─────────────────
  - type: custom:bubble-card
    card_type: separator
    name: Bijverwarming
  - type: grid
    columns: 2
    square: false
    cards:
      - type: custom:bubble-card
        card_type: button
        button_type: state
        entity: switch.infrarood_eva
        name: Infrarood Eva
        icon: mdi:radiator
        card_layout: large
        tap_action: { action: toggle }
        hold_action: { action: more-info }
        styles: |
          .bubble-button-background { opacity: 1 !important; background-color: ${state === 'on' ? 'rgba(240,195,95,0.14)' : 'rgba(255,255,255,0.04)'} !important; }
          .bubble-icon-container { background-color: ${state === 'on' ? 'rgba(240,195,95,0.20)' : 'rgba(255,255,255,0.07)'} !important; }
          .bubble-state { font-size: 0 !important; }
          .bubble-state::after { font-size: 12.5px !important; color: ${state === 'on' ? '#f0cf8f' : '#8f8e9e'} !important; content: "${(() => { if (hass.states['switch.infrarood_eva']?.state !== 'on') return 'uit'; const n = parseFloat(hass.states['sensor.infrarood_eva_power']?.state); return isFinite(n) ? Math.round(n) + ' W' : 'aan'; })()}"; }
      - type: custom:bubble-card
        card_type: button
        button_type: state
        entity: switch.infrarood_noa
        name: Infrarood Noa
        icon: mdi:radiator
        card_layout: large
        tap_action: { action: toggle }
        hold_action: { action: more-info }
        styles: |
          .bubble-button-background { opacity: 1 !important; background-color: ${state === 'on' ? 'rgba(240,195,95,0.14)' : 'rgba(255,255,255,0.04)'} !important; }
          .bubble-icon-container { background-color: ${state === 'on' ? 'rgba(240,195,95,0.20)' : 'rgba(255,255,255,0.07)'} !important; }
          .bubble-state { font-size: 0 !important; }
          .bubble-state::after { font-size: 12.5px !important; color: ${state === 'on' ? '#f0cf8f' : '#8f8e9e'} !important; content: "${(() => { if (hass.states['switch.infrarood_noa']?.state !== 'on') return 'uit'; const n = parseFloat(hass.states['sensor.infrarood_noa_switch_power']?.state); return isFinite(n) ? Math.round(n) + ' W' : 'aan'; })()}"; }
      - type: custom:bubble-card
        card_type: button
        button_type: state
        entity: switch.shelly_plug_badkamer_verwarming_relay
        name: Badkamer
        icon: mdi:heating-coil
        card_layout: large
        tap_action: { action: toggle }
        hold_action: { action: more-info }
        styles: |
          .bubble-button-background { opacity: 1 !important; background-color: ${state === 'on' ? 'rgba(240,195,95,0.14)' : 'rgba(255,255,255,0.04)'} !important; }
          .bubble-icon-container { background-color: ${state === 'on' ? 'rgba(240,195,95,0.20)' : 'rgba(255,255,255,0.07)'} !important; }
          .bubble-state { font-size: 0 !important; }
          .bubble-state::after { font-size: 12.5px !important; color: ${state === 'on' ? '#f0cf8f' : '#8f8e9e'} !important; content: "${(() => { if (hass.states['switch.shelly_plug_badkamer_verwarming_relay']?.state !== 'on') return 'uit'; const n = parseFloat(hass.states['sensor.shelly_plug_badkamer_verwarming_power']?.state); return isFinite(n) ? Math.round(n) + ' W' : 'aan'; })()}"; }
      - type: custom:bubble-card
        card_type: button
        button_type: state
        entity: switch.shelly_plug_douche_verwarming_relay
        name: Douche
        icon: mdi:heating-coil
        card_layout: large
        tap_action: { action: toggle }
        hold_action: { action: more-info }
        styles: |
          .bubble-button-background { opacity: 1 !important; background-color: ${state === 'on' ? 'rgba(240,195,95,0.14)' : 'rgba(255,255,255,0.04)'} !important; }
          .bubble-icon-container { background-color: ${state === 'on' ? 'rgba(240,195,95,0.20)' : 'rgba(255,255,255,0.07)'} !important; }
          .bubble-state { font-size: 0 !important; }
          .bubble-state::after { font-size: 12.5px !important; color: ${state === 'on' ? '#f0cf8f' : '#8f8e9e'} !important; content: "${(() => { if (hass.states['switch.shelly_plug_douche_verwarming_relay']?.state !== 'on') return 'uit'; const n = parseFloat(hass.states['sensor.shelly_plug_douche_verwarming_power']?.state); return isFinite(n) ? Math.round(n) + ' W' : 'aan'; })()}"; }
  # ── luchtontvochtiger ─────────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: Luchtontvochtiger
  - type: humidifier
    entity: humidifier.master_bedroom
    features:
      - type: humidifier-toggle
      - type: humidifier-modes
        style: dropdown
        modes:
          - Set
          - Smart
          - Continuous
          - Dry
  # ── temperatuurverloop ────────────────────────────────────────────
  - type: custom:bubble-card
    card_type: separator
    name: Temperatuur (24 uur)
  - type: statistics-graph
    period: hour
    days_to_show: 1
    stat_types: mean
    chart_type: line
    entities:
      - entity: sensor.climate_sensor_masterbedroom_temperature
        name: Master
      - entity: sensor.climate_sensor_eva_temperature
        name: Eva
      - entity: sensor.climate_sensor_noa_temperature
        name: Noa
      - entity: sensor.climate_sensor_guestroom_temperature
        name: Loge
