      # ─────────────────────────── ENERGIE & WATER ───────────────────────────
      # Placed before Tuin (span 2) so row 1 fills Beneden·Boven·Energie in
      # order — no masonry back-fill, so Tuin and Huis&auto align at any width.
      - type: grid
        cards:
          # navbar scroll target — MOBILE ONLY (see Beneden note)
          - type: custom:anchor-card
            anchor_id: energy-anchor
            timeout: 200
            offset: -100
            visibility:
              - condition: screen
                media_query: "(max-width: 767px)"
            grid_options: { columns: full, rows: 1 }
          - type: custom:bubble-card
            card_type: separator
            name: Energie & water
            icon: mdi:lightning-bolt
            modules: [bubble_compact_rows]
          - type: custom:bubble-card
            card_type: button
            card_layout: large
            button_type: state
            entity: sensor.net_power_consumption
            name: Energie
            icon: mdi:solar-power
            tap_action: { action: navigate, navigation_path: '#energie' }
            button_action:
              tap_action: { action: navigate, navigation_path: '#energie' }
            sub_button:
              - entity: sensor.electricity_cost_today   # € spent today
                show_state: true
                show_icon: false
                show_name: false
                show_background: true
              - entity: sensor.daily_consumption_energy # kWh used today
                show_state: true
                show_icon: false
                show_name: false
                show_background: true
            modules: [bubble_neon_icon_only]
            styles: |
              /* hover tooltip explaining the two bottom bars (desktop hover) */
              ${(() => { const c = card.querySelector('.bubble-button-card-container'); if (c) c.title = 'Bars (links → rechts):\n• Prijs: huidige stroomprijs binnen de dagrange — groen = goedkoop, rood = duur.\n• Zon: aandeel van het huidige verbruik dat de zonnepanelen dekken (vol = 100%).'; return ''; })()}
              /* colour by production vs usage: solar > usage = green,
                 roughly balanced = orange, usage > solar = red */
              .bubble-button-background {
                opacity: 1 !important;
                background-color: ${(() => {
                  const usage = parseFloat(hass.states['sensor.net_power_consumption']?.state);
                  const prod = (parseFloat(hass.states['sensor.solaredge_dc_power']?.state) || 0) / 1000;
                  if (isNaN(usage)) return 'transparent';
                  const diff = prod - usage;                             /* >0 = producing more than using */
                  if (diff > 0.2) return 'rgba(70, 200, 120, 0.45)';     /* green */
                  if (diff < -0.2) return 'rgba(230, 70, 70, 0.42)';     /* red */
                  return 'rgba(235, 150, 45, 0.40)';                     /* orange */
                })()} !important;
              }
              .bubble-button-card-container { position: relative !important; }
              /* state: usage / +production kW · price per kWh */
              .bubble-state { font-size: 0 !important; }
              .bubble-state::after {
                font-size: 13px !important;
                content: "${(() => {
                  const usage = parseFloat(hass.states['sensor.net_power_consumption']?.state) || 0;
                  const prod = (parseFloat(hass.states['sensor.solaredge_dc_power']?.state) || 0) / 1000;
                  const price = parseFloat(hass.states['sensor.current_price_electricity']?.state) || 0;
                  return '-' + Math.abs(usage).toFixed(2) + ' / +' + prod.toFixed(2) + ' kW · €' + price.toFixed(2);
                })()}";
              }
              /* ── left bar: price position today (green=cheap → red=expensive) ── */
              .bubble-button-card-container::before {
                content: ''; position: absolute; left: 20px; right: calc(50% + 6px); bottom: 12px;
                height: 5px; border-radius: 999px; z-index: 2; pointer-events: none;
                background: ${(() => {
                  const p = hass.states['sensor.electricity_price_langeweide_28'];
                  const cur = parseFloat(p?.state);
                  const mn = p?.attributes?.min_price, mx = p?.attributes?.max_price;
                  let f = (mn != null && mx != null && mx > mn) ? (cur - mn) / (mx - mn) : 0;
                  f = Math.max(0, Math.min(1, f));
                  const pct = (f * 100).toFixed(0);
                  const hue = Math.round(120 * (1 - f));
                  return `linear-gradient(90deg, hsl(${hue},75%,52%) ${pct}%, rgba(255,255,255,0.13) ${pct}%)`;
                })()} !important;
              }
              /* ── right bar: share of current load covered by solar ── */
              .bubble-button-card-container::after {
                content: ''; position: absolute; left: calc(50% + 6px); right: 20px; bottom: 12px;
                height: 5px; border-radius: 999px; z-index: 2; pointer-events: none;
                background: ${(() => {
                  const usage = parseFloat(hass.states['sensor.net_power_consumption']?.state);
                  const prod = (parseFloat(hass.states['sensor.solaredge_dc_power']?.state) || 0) / 1000;
                  let cov = (usage > 0) ? (prod / usage * 100) : 100;
                  cov = Math.max(0, Math.min(100, cov)).toFixed(0);
                  return `linear-gradient(90deg, #46c77a ${cov}%, rgba(255,255,255,0.13) ${cov}%)`;
                })()} !important;
              }
            grid_options: { columns: 12, rows: 2 }
          - type: custom:bubble-card
            card_type: button
            card_layout: large
            button_type: state
            entity: sensor.watermeter_water_usage
            name: Water
            icon: mdi:water
            tap_action: { action: navigate, navigation_path: '#water' }
            button_action:
              tap_action: { action: navigate, navigation_path: '#water' }
            modules: [bubble_neon_icon_only]
            styles: |
              .bubble-button-background {
                opacity: 1 !important;
                background-color: ${(parseFloat(state) > 0 ? 'rgba(60, 140, 245, 0.45)' : 'transparent')} !important;
              }
              /* current flow · today's total usage */
              .bubble-state { font-size: 0 !important; }
              .bubble-state::after {
                font-size: 13px !important;
                content: "${(() => { const flow = parseFloat(hass.states['sensor.watermeter_water_usage']?.state); const daily = parseFloat(hass.states['sensor.water_daily']?.state); const f = isNaN(flow) ? 0 : flow; const d = isNaN(daily) ? '?' : (Math.round(daily * 100) / 100); return f + ' L/min · ' + d + ' m³ vandaag'; })()}";
              }
            grid_options: { columns: 6, rows: 2 }
          - type: custom:bubble-card
            card_type: button
            card_layout: large
            button_type: state
            entity: water_heater.domestic_hot_water_tank
            name: Warm water
            icon: mdi:water-boiler
            tap_action: { action: navigate, navigation_path: '#warm-water' }
            button_action:
              tap_action: { action: navigate, navigation_path: '#warm-water' }
            modules: [bubble_neon_icon_only]
            styles: |
              /* orange only when actually heating the tank — same logic as the
                 main dashboard's dhw template: DHW on, tank >5°C below setpoint,
                 and the heat pump drawing >1000W */
              .bubble-button-background {
                opacity: 1 !important;
                background-color: ${(() => {
                  const w = hass.states['water_heater.domestic_hot_water_tank'];
                  const p = parseFloat(hass.states['sensor.shelly_warmtepomp_meter_total_active_power']?.state);
                  const heating = w?.attributes?.operation_mode === 'on'
                    && (w.attributes.temperature - w.attributes.current_temperature) > 5
                    && p > 1000;
                  return heating ? 'rgba(235, 150, 45, 0.40)' : 'transparent';
                })()} !important;
              }
              /* show the actual water temperature instead of the on/off state */
              .bubble-state { font-size: 0 !important; }
              .bubble-state::after {
                font-size: 14px !important;
                content: "${(() => { const t = hass.states['water_heater.domestic_hot_water_tank']?.attributes?.current_temperature; return (t != null ? t + ' °C' : '—'); })()}";
              }
            grid_options: { columns: 6, rows: 2 }

