wallpanel:
  enabled: true
  hide_toolbar: false
  idle_time: 0

# Shared decluttering-card templates (sonos_popup, light_button, …) so popups
# opened from this dashboard can resolve them — same file the main dashboard uses.
decluttering_templates: !include ../templates/decluttering_templates.yaml
# button-card templates too, so popups that use custom:button-card (e.g. the
# Updates popup's updates_hass template) resolve when opened from this dashboard.
button_card_templates: !include_dir_merge_named ../templates/button_card_templates

views:
  # ============================================================================
  #  Langeweide — Bubble Card dashboard (HA native "sections" view)
  #  Paste this under `views:` in your dashboard's Raw configuration editor.
  #
  #  MODULES USED (custom modules live in bubble_card/modules/*.yaml):
  #    - weather_forecast          → Bubble Weather
  #    - bubble_calendar_enhanced  → Bubble Calendar Enhanced
  #    - bubble_neon_icon_only     → local module (bubble_card/modules/bubble_neon_icon_only.yaml):
  #                                  per-card icon accent color, no whole-card gradient.
  #                                  Deliberately NOT the upstream "Bubble Neon" module — that one
  #                                  colors the entire tile, which doesn't match the approved mockup.
  #    - bubble_badges             → Bubble Badges 2
  #
  #  Layout: HA sections view. A section's internal grid is column_span × 12
  #  columns (NOT a flat 12). Non-spanned sections use 12 cols (6 = half,
  #  4 = third). View is capped at max_columns: 3, so the header
  #  (column_span: 3 → 36 cols) and Tuin (column_span: 2 → 24 cols)
  #  sections below have their card `columns` scaled up accordingly so
  #  tiles don't pack too tight / truncate. Header row = 12+13+11 = 36;
  #  chip strip = 6 chips × 6 = 36.
  #  Everything is drag-resizable in the UI editor after pasting.
  # ============================================================================

  - title: Overzicht
    path: overzicht
    type: sections
    theme: custom-dark
    # dark scrim over the wallpaper so the neon accents pop (raise the 0.62
    # alpha toward 1 for even darker, lower it toward 0 to show more wallpaper)
    background: "linear-gradient(rgba(8, 6, 16, 0.62), rgba(8, 6, 16, 0.62)), url('/local/bubble_background.jpg') center / cover no-repeat"
    max_columns: 3          # mockup is a 3-column design; also fixes the header
                            # grid at 36 cols (3×12) so tile widths are deterministic
    dense_section_placement: true
    sections:

      # ───────────────────────── HEADER: weer · agenda · status ──────────────
      - type: grid
        column_span: 3
        cards:
          # navbar scroll target for the "Huis" route — MOBILE ONLY
          - type: custom:anchor-card
            anchor_id: top
            timeout: 200
            offset: -50
            visibility:
              - condition: screen
                media_query: "(max-width: 767px)"
            grid_options: { columns: full, rows: 1 }
          # Bubble Weather (Square layout with forecast)
          - type: custom:bubble-card
            card_type: button
            card_layout: large            # enables the module's square forecast-grid layout
            button_type: state            # shows current condition text under "Weer"
            entity: weather.weather_langeweide_ecowitt
            name: Weer
            tap_action: { action: navigate, navigation_path: '#weer' }
            button_action:
              tap_action: { action: navigate, navigation_path: '#weer' }
            weather_forecast:
              type: daily
              max_days: 5
              min_day_width: 60
              disable_dynamic_background: false
              disable_animations: false
            modules:
              - weather_forecast          # own animated background + weather icon; no neon override
            grid_options: { columns: 12, rows: 4 }

          # Bubble Calendar Enhanced (agenda + live clock/date)
          - type: custom:bubble-card
            card_type: calendar
            rows: 4
            event_action:
              tap_action:
                action: more-info
            sub_button:
              main: []
              bottom: []
            entities:
              - entity: calendar.joep
                color: "#4C7160"
              - entity: calendar.rob
                color: "#E9CF15"
            days: 7
            limit: 6
            modules:
              - bubble_calendar_enhanced   # layout: time+date bottom, Dusk Bokeh
              - bubble_neon_icon_only
            bubble_calendar_enhanced:
              background: 'radial-gradient(ellipse at 80% 15%, rgba(148,108,215,0.28) 0%, transparent 65%), radial-gradient(ellipse at 10% 85%, rgba(82,158,192,0.22) 0%, transparent 68%), radial-gradient(ellipse at 50% 50%, rgba(170,88,158,0.15) 0%, transparent 60%), #4d3a6e'
            grid_options: { columns: 12, rows: 4 }

          # ── Right column (mockup's 3rd header column) ──────────────────────
          # ONE nested grid so it's a deterministic compact panel the same
          # height as Weer/Agenda: Alarm | Gasten on row 1, then the 2×2
          # presence grid (Rob|Steffi / Eva|Noa) below. columns:2 → 3 rows.
          - type: grid
            columns: 1
            square: false
            # Presence panel (mockup's 3rd column): lighter glass background,
            # rounded, subtle border + shadow, inner padding. Top row =
            # Alarm | Gasten (fill) + a small Settings icon button; then the
            # 2×2 people grid (Rob|Steffi / Eva|Noa).
            card_mod:
              style: |
                :host {
                  background: rgba(255, 255, 255, 0.05);
                  border: 1px solid rgba(255, 255, 255, 0.08);
                  border-radius: 24px;
                  box-shadow: 0 10px 30px rgba(0, 0, 0, 0.28);
                  padding: 12px;
                  box-sizing: border-box;
                }
                /* on phones: keep the glass panel but span the full width, so the
                   buttons inside just divide the space (same width as the
                   weather/agenda cards and the sections below) */
                @media (max-width: 767px) {
                  :host { grid-column: 1 / -1 !important; }
                }
            cards:
              # top row: Alarm + Gasten fill, Settings pinned small on the right
              # (grid-template-columns is more reliable than flex here)
              - type: grid
                columns: 3
                square: false
                card_mod:
                  style: |
                    #root { grid-template-columns: 1fr 1fr 56px !important; gap: 8px !important; }
                cards:
                  - type: custom:bubble-card
                    card_type: button
                    button_type: name
                    entity: alarm_control_panel.alarmo
                    name: Alarm
                    icon: mdi:shield-check
                    tap_action: { action: navigate, navigation_path: '#alarm' }
                    button_action:
                      tap_action: { action: navigate, navigation_path: '#alarm' }
                    sub_button:
                      - icon: mdi:weather-night   # arm the alarm in night mode
                        tap_action:
                          action: perform-action
                          perform_action: alarm_control_panel.alarm_arm_night
                          target:
                            entity_id: alarm_control_panel.alarmo
                    modules: [bubble_neon_icon_only]
                    styles: |
                      .bubble-container, .bubble-button-container { min-height: 0 !important; height: 56px !important; }
                  - type: custom:bubble-card
                    card_type: button
                    button_type: state
                    entity: input_boolean.guest_mode
                    name: Gasten
                    icon: mdi:account-multiple-plus
                    tap_action:
                      action: toggle
                    button_action:
                      tap_action:
                        action: toggle
                    bubble_badges:
                      badges:
                        - name: Gastenmodus actief
                          target: main_icon
                          dot: true
                          color: red
                          condition:
                            - condition: state
                              entity_id: input_boolean.guest_mode
                              state: "on"
                    modules: [bubble_badges, bubble_neon_icon_only]
                    styles: |
                      .bubble-container, .bubble-button-container { min-height: 0 !important; height: 56px !important; }
                      /* enabled = full magenta; disabled (guest mode off) = greyed + dimmed */
                      .bubble-main-icon-container {
                        filter: grayscale(${state === 'on' ? 0 : 1}) !important;
                        opacity: ${state === 'on' ? 1 : 0.4} !important;
                      }
                      .bubble-name, .bubble-state {
                        opacity: ${state === 'on' ? 1 : 0.6} !important;
                      }
                  # small icon-only Settings button → opens the system popup.
                  # Plain grey icon (no neon glow); red count badge when there
                  # are unavailable entities.
                  - type: custom:bubble-card
                    card_type: button
                    entity: sensor.unavailable_entities
                    icon: mdi:cog
                    show_name: false
                    show_state: false
                    tap_action: { action: navigate, navigation_path: '#systeem' }
                    button_action:
                      tap_action: { action: navigate, navigation_path: '#systeem' }
                    bubble_badges:
                      badges:
                        - name: Unavailable entities
                          target: main_icon
                          entity: sensor.unavailable_entities
                          color: red
                          condition:
                            - condition: numeric_state
                              entity_id: sensor.unavailable_entities
                              above: 0
                    modules: [bubble_badges]
                    styles: |
                      .bubble-container, .bubble-button-container { min-height: 0 !important; height: 56px !important; }
                      .bubble-icon-container { background: rgba(255, 255, 255, 0.10) !important; }
                      .bubble-main-icon { color: var(--secondary-text-color, #9aa3b2) !important; opacity: 1 !important; }
              # 2×2 people grid
              - type: grid
                columns: 2
                square: false
                cards:
                  - type: custom:bubble-card
                    card_type: button
                    button_type: state
                    entity: person.rob
                    name: Rob
                    show_entity_picture: true
                    tap_action: { action: navigate, navigation_path: '#person-rob' }
                    button_action:
                      tap_action: { action: navigate, navigation_path: '#person-rob' }
                    icon_tap_action: { action: navigate, navigation_path: '#person-rob' }
                    bubble_badges:
                      badges:
                        - name: Thuis
                          target: main_icon
                          icon: mdi:home
                          color: green
                          condition:
                            - condition: state
                              entity_id: person.rob
                              state: "home"
                        - name: Werk
                          target: main_icon
                          icon: mdi:briefcase
                          color: blue
                          condition:
                            - condition: state
                              entity_id: person.rob
                              state: "Maxxton"
                    modules:
                      - bubble_badges   # thuis + werk badge on the main icon
                      - bubble_neon_icon_only
                    styles: |
                      .bubble-container, .bubble-button-container { min-height: 0 !important; height: 56px !important; }
                      /* disabled look when not home (like Gasten) */
                      .bubble-entity-picture, .bubble-main-icon-container {
                        filter: grayscale(${state === 'home' ? 0 : 1}) !important;
                        opacity: ${state === 'home' ? 1 : 0.4} !important;
                      }
                      .bubble-name, .bubble-state {
                        opacity: ${state === 'home' ? 1 : 0.6} !important;
                      }
                  - type: custom:bubble-card
                    card_type: button
                    button_type: state
                    entity: person.steffi
                    name: Steffi
                    show_entity_picture: true
                    tap_action: { action: navigate, navigation_path: '#person-steffi' }
                    button_action:
                      tap_action: { action: navigate, navigation_path: '#person-steffi' }
                    icon_tap_action: { action: navigate, navigation_path: '#person-steffi' }
                    bubble_badges:
                      badges:
                        - name: Thuis
                          target: main_icon
                          icon: mdi:home
                          color: green
                          condition:
                            - condition: state
                              entity_id: person.steffi
                              state: "home"
                        - name: Werk
                          target: main_icon
                          icon: mdi:briefcase
                          color: blue
                          condition:
                            - condition: state
                              entity_id: person.steffi
                              state: "CJG"
                    modules: [bubble_badges, bubble_neon_icon_only]
                    styles: |
                      .bubble-container, .bubble-button-container { min-height: 0 !important; height: 56px !important; }
                      /* disabled look when not home (like Gasten) */
                      .bubble-entity-picture, .bubble-main-icon-container {
                        filter: grayscale(${state === 'home' ? 0 : 1}) !important;
                        opacity: ${state === 'home' ? 1 : 0.4} !important;
                      }
                      .bubble-name, .bubble-state {
                        opacity: ${state === 'home' ? 1 : 0.6} !important;
                      }
                  # entity is the bed-presence sensor (drives the state text
                  # below the name, e.g. "Detected"/"Clear"). Bubble Card has no
                  # "picture:" override key, so the camera's live snapshot is
                  # force-shown on the (otherwise hidden, since a binary_sensor
                  # has no entity_picture) .bubble-entity-picture element via
                  # the styles: block instead.
                  - type: custom:bubble-card
                    card_type: button
                    button_type: state
                    entity: binary_sensor.eva_bed_presence
                    name: Eva
                    show_entity_picture: true
                    tap_action: { action: navigate, navigation_path: '#person-eva' }
                    button_action:
                      tap_action: { action: navigate, navigation_path: '#person-eva' }
                    icon_tap_action: { action: navigate, navigation_path: '#person-eva' }
                    modules: [bubble_neon_icon_only]
                    styles: |
                      .bubble-container, .bubble-button-container { min-height: 0 !important; height: 56px !important; }
                      .bubble-entity-picture {
                        display: block !important;
                        background-image: url('${hass.states['camera.evabed']?.attributes?.entity_picture}') !important;
                        background-size: cover !important;
                      }
                      .bubble-main-icon { display: none !important; }
                  - type: custom:bubble-card
                    card_type: button
                    button_type: state
                    entity: binary_sensor.noa_bed_presence
                    name: Noa
                    show_entity_picture: true
                    tap_action: { action: navigate, navigation_path: '#person-noa' }
                    button_action:
                      tap_action: { action: navigate, navigation_path: '#person-noa' }
                    icon_tap_action: { action: navigate, navigation_path: '#person-noa' }
                    modules: [bubble_neon_icon_only]
                    styles: |
                      .bubble-container, .bubble-button-container { min-height: 0 !important; height: 56px !important; }
                      .bubble-entity-picture {
                        display: block !important;
                        background-image: url('${hass.states['camera.noabed']?.attributes?.entity_picture}') !important;
                        background-size: cover !important;
                      }
                      .bubble-main-icon { display: none !important; }
            grid_options: { columns: 12, rows: 4 }

          # ── Status chip strip ─────────────────────────────────────────────
          # Chips packed together on the left: bins first, then Stookwijzer/
          # Updates/Picnic. Each fills its grid cell, so a smaller `columns` =
          # a narrower pill (Picnic < Grijze bak). Widths sum to 32 of the
          # header's 36 cols → one row, packed left with the section gap, the
          # remaining ~4 cols of slack sit at the right (no spreading).
          - type: grid
            columns: 7
            square: false
            card_mod:
              style: |
                /* mobile default: 6 small icon-only chips in one compact row */
                #root { grid-template-columns: repeat(6, 1fr) !important; gap: 6px !important; }
                /* desktop: trash left · gap track · ambient right */
                @media (min-width: 768px) {
                  #root { grid-template-columns: 1fr 1fr 1fr 0.6fr 1fr 1fr 1fr !important; }
                  #root > *:nth-child(4) { grid-column: 5 !important; }
                  #root > *:nth-child(5) { grid-column: 6 !important; }
                  #root > *:nth-child(6) { grid-column: 7 !important; }
                }
            grid_options: { columns: 36, rows: auto }
            cards:
            - type: custom:bubble-card
              card_type: button
              button_type: state
              entity: sensor.template_gft_days_until_collection
              name: Groene bak
              icon: mdi:recycle
              tap_action: { action: navigate, navigation_path: '#afval' }
              button_action:
                tap_action: { action: navigate, navigation_path: '#afval' }
              show_state: false
              show_attribute: true
              attribute: text
              bubble_badges:
                badges:
                  - name: Ophaaldag vandaag
                    target: main_icon
                    dot: true
                    color: red
                    condition:
                      - condition: numeric_state
                        entity_id: sensor.template_gft_days_until_collection
                        below: 1
                  - name: Ophaaldag morgen
                    target: main_icon
                    dot: true
                    color: orange
                    condition:
                      - condition: numeric_state
                        entity_id: sensor.template_gft_days_until_collection
                        above: 0
                        below: 2
              modules: [bubble_badges]
              styles: |
                :host { --bubble-border-radius: 20px; --bubble-icon-border-radius: 30%; }
                .bubble-button-container {
                  background-image: radial-gradient(140% 120% at 8% -10%, color-mix(in srgb, ${hass.states['sensor.template_gft_days_until_collection']?.attributes?.color || 'green'} 26%, transparent), transparent 55%) !important;
                  border: 1px solid color-mix(in srgb, ${hass.states['sensor.template_gft_days_until_collection']?.attributes?.color || 'green'} 55%, transparent) !important;
                }
                .bubble-icon-container {
                  background: ${hass.states['sensor.template_gft_days_until_collection']?.attributes?.color || 'green'} !important;
                }
                @media (max-width: 767px) {
                  .bubble-name-container { display: none !important; }
                  .bubble-button-card, .bubble-button { justify-content: center !important; }
                }
              grid_options: { columns: 6, rows: 1 }
            - type: custom:bubble-card
              card_type: button
              button_type: state
              entity: sensor.template_paper_days_until_collection
              name: Papier
              icon: mdi:newspaper-variant-outline
              tap_action: { action: navigate, navigation_path: '#afval' }
              button_action:
                tap_action: { action: navigate, navigation_path: '#afval' }
              show_state: false
              show_attribute: true
              attribute: text
              bubble_badges:
                badges:
                  - name: Ophaaldag vandaag
                    target: main_icon
                    dot: true
                    color: red
                    condition:
                      - condition: numeric_state
                        entity_id: sensor.template_paper_days_until_collection
                        below: 1
                  - name: Ophaaldag morgen
                    target: main_icon
                    dot: true
                    color: orange
                    condition:
                      - condition: numeric_state
                        entity_id: sensor.template_paper_days_until_collection
                        above: 0
                        below: 2
              modules: [bubble_badges]
              styles: |
                :host { --bubble-border-radius: 20px; --bubble-icon-border-radius: 30%; }
                .bubble-button-container {
                  background-image: radial-gradient(140% 120% at 8% -10%, color-mix(in srgb, ${hass.states['sensor.template_paper_days_until_collection']?.attributes?.color || '#3182b7'} 26%, transparent), transparent 55%) !important;
                  border: 1px solid color-mix(in srgb, ${hass.states['sensor.template_paper_days_until_collection']?.attributes?.color || '#3182b7'} 55%, transparent) !important;
                }
                .bubble-icon-container {
                  background: ${hass.states['sensor.template_paper_days_until_collection']?.attributes?.color || '#3182b7'} !important;
                }
                @media (max-width: 767px) {
                  .bubble-name-container { display: none !important; }
                  .bubble-button-card, .bubble-button { justify-content: center !important; }
                }
              grid_options: { columns: 6, rows: 1 }
            - type: custom:bubble-card
              card_type: button
              button_type: state
              entity: sensor.template_rest_days_until_collection
              name: Grijze bak
              icon: mdi:trash-can-outline
              tap_action: { action: navigate, navigation_path: '#afval' }
              button_action:
                tap_action: { action: navigate, navigation_path: '#afval' }
              show_state: false
              show_attribute: true
              attribute: text
              bubble_badges:
                badges:
                  - name: Ophaaldag vandaag
                    target: main_icon
                    dot: true
                    color: red
                    condition:
                      - condition: numeric_state
                        entity_id: sensor.template_rest_days_until_collection
                        below: 1
                  - name: Ophaaldag morgen
                    target: main_icon
                    dot: true
                    color: orange
                    condition:
                      - condition: numeric_state
                        entity_id: sensor.template_rest_days_until_collection
                        above: 0
                        below: 2
              modules: [bubble_badges]
              styles: |
                :host { --bubble-border-radius: 20px; --bubble-icon-border-radius: 30%; }
                .bubble-button-container {
                  background-image: radial-gradient(140% 120% at 8% -10%, color-mix(in srgb, ${hass.states['sensor.template_rest_days_until_collection']?.attributes?.color || 'grey'} 26%, transparent), transparent 55%) !important;
                  border: 1px solid color-mix(in srgb, ${hass.states['sensor.template_rest_days_until_collection']?.attributes?.color || 'grey'} 55%, transparent) !important;
                }
                .bubble-icon-container {
                  background: ${hass.states['sensor.template_rest_days_until_collection']?.attributes?.color || 'grey'} !important;
                }
                @media (max-width: 767px) {
                  .bubble-name-container { display: none !important; }
                  .bubble-button-card, .bubble-button { justify-content: center !important; }
                }
              grid_options: { columns: 6, rows: 1 }
            - type: custom:bubble-card
              card_type: button
              button_type: name
              entity: sensor.stookwijzer
              name: Stookwijzer
              icon: mdi:fire
              tap_action: { action: navigate, navigation_path: '#stookwijzer' }
              button_action:
                tap_action: { action: navigate, navigation_path: '#stookwijzer' }
              modules: [bubble_neon_icon_only]
              styles: |
                @media (max-width: 767px) {
                  .bubble-name-container { display: none !important; }
                  .bubble-button-card, .bubble-button { justify-content: center !important; }
                }
              grid_options: { columns: 6, rows: 1 }
            - type: custom:bubble-card
              card_type: button
              button_type: name
              entity: sensor.all_updates
              name: Updates
              icon: mdi:package-up
              tap_action: { action: navigate, navigation_path: '#updates' }
              button_action:
                tap_action: { action: navigate, navigation_path: '#updates' }
              bubble_badges:
                badges:
                  - name: Update count
                    target: main_icon
                    entity: sensor.all_updates
                    raw_state: true          # show just the number ("3"), not "3 Update(s)"
                    color: red
                    condition:
                      - condition: numeric_state
                        entity_id: sensor.all_updates
                        above: 0
              modules:
                - bubble_badges   # badge = update count on the icon
                - bubble_neon_icon_only
              styles: |
                @media (max-width: 767px) {
                  .bubble-name-container { display: none !important; }
                  .bubble-button-card, .bubble-button { justify-content: center !important; }
                }
              grid_options: { columns: 6, rows: 1 }
            - type: custom:bubble-card
              card_type: button
              button_type: state
              entity: sensor.picnic_cart_items_count
              name: Picnic
              icon: mdi:cart
              tap_action: { action: navigate, navigation_path: '#picnic' }
              button_action:
                tap_action: { action: navigate, navigation_path: '#picnic' }
              bubble_badges:
                badges:
                  - name: Cart count
                    target: main_icon
                    entity: sensor.picnic_cart_items_count
                    color: red
                    condition:
                      - condition: numeric_state
                        entity_id: sensor.picnic_cart_items_count
                        above: 0
              modules:
                - bubble_badges   # badge = cart item count (the "3")
                - bubble_neon_icon_only
              styles: |
                /* subtitle = when the next Picnic delivery slot starts */
                .bubble-state { font-size: 0 !important; }
                .bubble-state::after {
                  font-size: 12px !important;
                  content: "${(() => { const s = hass.states['sensor.picnic_start_of_selected_slot']?.state; if (!s || s === 'unknown' || s === 'unavailable') return 'Geen bezorging'; const d = new Date(s); const days = ['zo','ma','di','wo','do','vr','za']; return days[d.getDay()] + ' ' + d.toLocaleTimeString('nl-NL', {hour:'2-digit', minute:'2-digit'}); })()}";
                }
                @media (max-width: 767px) {
                  .bubble-name-container { display: none !important; }
                  .bubble-button-card, .bubble-button { justify-content: center !important; }
                }
              grid_options: { columns: 6, rows: 1 }
          # ── Bubble Card native pop-ups (each in its own popups/bpp_*.yaml) ──
          #    (widths set per-file via width_desktop; mobile = full-width)
          - !include popups/bpp_afval.yaml           # #afval  ← 3 trash chips
          - !include popups/bpp_doors_downstairs.yaml # #deuren-beneden ← Deuren (Beneden)
          - !include popups/bpp_doors_upstairs.yaml  # #ramen-boven ← Ramen (Boven)
          - !include popups/bpp_doors_garden.yaml    # #deuren-tuin ← Deuren (Tuin)
          - !include popups/bpp_covers.yaml          # #screens ← Screens
          - !include popups/bpp_energy_water.yaml    # #water ← Water
          - !include popups/bpp_person_rob.yaml      # #person-rob ← Rob
          - !include popups/bpp_person_steffi.yaml   # #person-steffi ← Steffi
          - !include popups/bpp_person_eva.yaml      # #person-eva ← Eva
          - !include popups/bpp_person_noa.yaml      # #person-noa ← Noa
