                content: "${(() => { const m = (hass.states['binary_sensor.doors_and_windows_garden']?.attributes?.entity_id) || []; const o = m.filter(e => hass.states[e]?.state === 'on').length; return o === 0 ? 'Alles dicht' : o + ' open · ' + (m.length - o) + ' dicht'; })()}";
              }
            grid_options: { columns: 6, rows: 2 }
          - type: custom:bubble-card
            card_type: button
            card_layout: large
            button_type: state
            entity: binary_sensor.motion_sensor_cats_occupancy
            name: Boris&Puk
            icon: mdi:cat
            modules: [bubble_neon_icon_only]
            grid_options: { columns: 6, rows: 2 }
            tap_action: { action: navigate, navigation_path: '#katten' }
            button_action:
              tap_action: { action: navigate, navigation_path: '#katten' }
          - type: custom:bubble-card
            card_type: button
            card_layout: large
            button_type: state
            entity: sensor.tuin_bbq_dome_thermometer_ambient_temperature
            name: BBQ
            icon: mdi:grill
            modules: [bubble_neon_icon_only]
            styles: |
              .bubble-button-background {
                opacity: 1 !important;
                background-color: ${(parseFloat(state) > 50 ? 'rgba(235, 95, 45, 0.55)' : 'transparent')} !important;
              }
            grid_options: { columns: 6, rows: 2 }
            tap_action: { action: navigate, navigation_path: '#bbq' }
            button_action:
              tap_action: { action: navigate, navigation_path: '#bbq' }
          - type: custom:bubble-card
            card_type: button
            card_layout: large
            button_type: state
            entity: lawn_mower.navimow_i108
            name: Grasmaaier
            icon: mdi:robot-mower
            sub_button:
              - entity: sensor.navimow_i108_battery
                show_state: true
                show_icon: false
                show_name: false
                show_background: true
            bubble_badges:
              badges:
                # red dot on the icon when there's a problem (error)
                - name: Probleem
                  target: main_icon
                  dot: true
                  color: red
                  condition:
                    - condition: state
                      entity_id: lawn_mower.navimow_i108
                      state: error
            modules:
              - bubble_badges   # problem dot
              - bubble_neon_icon_only
            styles: |
              /* light up green while actively mowing */
              .bubble-button-background {
                opacity: 1 !important;
                background-color: ${(state === 'mowing' ? 'rgba(70, 200, 120, 0.42)' : 'transparent')} !important;
              }
            grid_options: { columns: 6, rows: 2 }
            tap_action: { action: navigate, navigation_path: '#grasmaaier' }
            button_action:
              tap_action: { action: navigate, navigation_path: '#grasmaaier' }
          - type: custom:bubble-card
            card_type: button
            card_layout: large
            button_type: state
            entity: switch.irrigatie_zones
            name: Beregening
            icon: mdi:sprinkler-variant
            tap_action: { action: navigate, navigation_path: '#beregening' }
            button_action:
              tap_action: { action: navigate, navigation_path: '#beregening' }
            modules: [bubble_neon_icon_only]
            styles: |
              /* blue when watering is active or a plan is enabled */
              .bubble-button-background {
                opacity: 1 !important;
                background-color: ${((hass.states['switch.irrigatie_zones']?.state === 'on' || hass.states['input_boolean.irrigation_plan_enable']?.state === 'on') ? 'rgba(60, 140, 245, 0.45)' : 'transparent')} !important;
              }
              /* subtitle: active/planned + pending time */
              .bubble-state { font-size: 0 !important; }
              .bubble-state::after {
                font-size: 13px !important;
                content: "${(() => {
                  const on = hass.states['switch.irrigatie_zones']?.state === 'on';
                  const planned = hass.states['input_boolean.irrigation_plan_enable']?.state === 'on';
                  const dur = parseFloat(hass.states['sensor.irrigatie_zones_duur']?.state) || 0;    /* total minutes */
                  const fmt = (mins) => { const h = Math.floor(mins / 60), mm = mins % 60; return h > 0 ? h + 'u ' + String(mm).padStart(2, '0') + 'm' : mins + ' min'; };
                  if (on) {
                    /* remaining = start (switch turned on) + duration - now */
                    const start = new Date(hass.states['switch.irrigatie_zones'].last_changed).getTime();
                    let rem = Math.round((start + dur * 60000 - Date.now()) / 60000);
                    if (rem < 0) rem = 0;
                    return 'Nog ' + fmt(rem);
                  }
                  if (planned) return 'Gepland ' + (hass.states['input_datetime.irrigation_start_time']?.state || '').slice(0, 5);
                  return 'Uit';
                })()}";
              }
            grid_options: { columns: 6, rows: 2 }

      # ─────────────────────────── HUIS & AUTO ───────────────────────────────
      - type: grid
        cards:
          - type: custom:bubble-card
            card_type: separator
            name: Huis & auto
            icon: mdi:home
            modules: [bubble_compact_rows]
          # Wide BMW tile — location as the state, range + charge% as sub-buttons,
          # and a charge-level bar (CSS, width = state-of-charge %) along the
          # bottom. Charging badge on the icon watches the charger's status.
          - type: custom:bubble-card
            card_type: button
            button_type: state
            entity: device_tracker.ix3_location
            name: BMW iX3
            icon: mdi:car-electric
            tap_action: { action: navigate, navigation_path: '#auto' }
            button_action:
              tap_action: { action: navigate, navigation_path: '#auto' }
            sub_button:
              - entity: sensor.ix3_remaining_electric_range_km
                show_state: true
                show_icon: false
                show_name: false
              - entity: sensor.state_of_charge_predicted_on_bmw_side
                show_state: true
                show_icon: false
                show_name: false
                show_background: true
            bubble_badges:
              badges:
                - name: Charging
                  target: main_icon
                  icon: mdi:flash
                  color: blue
                  condition:
                    - condition: state
                      entity_id: sensor.ehhatdgg_status
                      state: charging
            modules:
              - bubble_badges
              - bubble_neon_icon_only
            styles: |
              /* light up green while the car is charging */
              .bubble-button-background {
                opacity: 1 !important;
                background-color: ${(hass.states['sensor.ehhatdgg_status']?.state === 'charging' ? 'rgba(70, 200, 120, 0.35)' : 'transparent')} !important;
              }
              .bubble-button-card-container { position: relative !important; }
              /* charge-bar track */
              .bubble-button-card-container::after {
                content: '';
                position: absolute;
                left: 20px; right: 20px; bottom: 12px;
                height: 6px; border-radius: 999px;
                background: rgba(255, 255, 255, 0.14);
                pointer-events: none;
              }
              /* charge-bar fill — width = state of charge % */
              .bubble-button-card-container::before {
                content: '';
                position: absolute;
                left: 20px; bottom: 12px; z-index: 1;
                height: 6px; border-radius: 999px;
                width: calc((100% - 40px) * ${(parseFloat(hass.states['sensor.state_of_charge_predicted_on_bmw_side']?.state) || 0) / 100});
                background: linear-gradient(90deg, #63e6e2, #46c7c3);
                box-shadow: 0 0 10px rgba(99, 230, 226, 0.45);
                pointer-events: none;
              }
            grid_options: { columns: 12, rows: 2 }
          - type: custom:bubble-card
            card_type: button
            card_layout: large
            button_type: state
            entity: cover.covers_downstairs
            name: Screens
            icon: mdi:blinds
            show_state: true
            tap_action: { action: navigate, navigation_path: '#screens' }
            button_action:
              tap_action: { action: navigate, navigation_path: '#screens' }
            modules: [bubble_neon_icon_only]
            styles: |
              /* subtitle = per-screen position + a flag when automation is off */
              .bubble-state { font-size: 0 !important; }
              .bubble-state::after {
                font-size: 14px !important;
                content: "${(() => { const d = id => { const p = hass.states[id]?.attributes?.current_position; return p == null ? '?' : (p === 0 ? 'dicht' : (p === 100 ? 'open' : p + '%')); }; const auto = hass.states['input_boolean.enable_automatic_screens']?.state === 'on'; return 'Voor ' + d('cover.voorraam') + ' · Zij ' + d('cover.zijraam') + (auto ? '' : ' · handmatig'); })()}";
              }
            grid_options: { columns: 6, rows: 2 }
          - type: custom:bubble-card
            card_type: button
            card_layout: large
            button_type: state
            entity: vacuum.sjorsje
            name: Sjorsje
            icon: mdi:robot-vacuum
            tap_action: { action: navigate, navigation_path: '#sjorsje' }
            button_action:
              tap_action: { action: navigate, navigation_path: '#sjorsje' }
            sub_button:
              - entity: sensor.sjorsje_battery_level
                show_state: true
                show_icon: false
                show_name: false
                show_background: true
            bubble_badges:
              badges:
                # red dot on the icon when there's a problem (full bin or error)
                - name: Probleem
                  target: main_icon
                  dot: true
                  color: red
                  condition:
                    - condition: or
                      conditions:
                        - condition: state
                          entity_id: binary_sensor.sjorsje_bin_full
                          state: "on"
                        - condition: state
                          entity_id: vacuum.sjorsje
                          state: error
            modules:
              - bubble_badges   # problem dot
              - bubble_neon_icon_only
            grid_options: { columns: 6, rows: 2 }

      # ──────────────────────── BOTTOM NAV (navbar-card) ─────────────────────
      # navbar-card, MOBILE ONLY — the section is hidden above 767px via the
      # visibility condition below. On the wall tablet / desktop you navigate by
      # scrolling and use the Settings button in the presence panel; the phone
      # gets the full bottom nav. Scroll routes (Huis/Beneden/Boven) jump to the
      # anchor-card targets above. Routes point at /lovelace-bubble/overzicht.
      - type: grid
        column_span: 3
        visibility:
          - condition: screen
            media_query: "(max-width: 767px)"
        cards:
          - type: custom:navbar-card
            desktop:
              position: bottom
            routes:
              - icon: mdi:arrow-up-bold-box-outline
                icon_selected: mdi:arrow-up-bold-box
                url: /lovelace-bubble/overzicht?anchor=top
                label: Huis
                selected: |
                  [[[
                    const matchesPath = window.location.pathname == "/lovelace-bubble/overzicht";
                    const hasAnchor = window.location.search.includes("anchor=top");
                    return matchesPath && hasAnchor;
                  ]]]
              - icon: mdi:sofa-outline
                icon_selected: mdi:sofa
                url: /lovelace-bubble/overzicht?anchor=downstairs-anchor
                label: Beneden
                selected: |
                  [[[
                    const matchesPath = window.location.pathname == "/lovelace-bubble/overzicht";
                    const hasAnchor = window.location.search.includes("anchor=downstairs-anchor");
                    return matchesPath && hasAnchor;
                  ]]]
              - icon: mdi:bed-double-outline
                icon_selected: mdi:bed-double
                url: /lovelace-bubble/overzicht?anchor=upstairs-anchor
                label: Boven
                selected: |
                  [[[
                    const matchesPath = window.location.pathname == "/lovelace-bubble/overzicht";
                    const hasAnchor = window.location.search.includes("anchor=upstairs-anchor");
                    return matchesPath && hasAnchor;
                  ]]]
              # Settings lives in the presence panel now, so it's dropped here.
              - icon: mdi:fire
                icon_selected: mdi:fire
                url: null
                tap_action:
                  { action: navigate, navigation_path: '#stookwijzer' }
                label: Stookwijzer
            grid_options: { columns: full, rows: 1 }
