#################################################
#                                               #
#                      BBQ                      #
#                                               #
#################################################

bbq:
  template:
    - circle
  variables:
    consider_on: >
      [[[
        if (!entity.state) return false;
        return entity.state > 50;
      ]]]
    icon: mdi:grill
    unit: "°C"
    circle_input: >
      [[[
        let dome = states['sensor.tuin_bbq_dome_thermometer_ambient_temperature'].state;
        if (dome === undefined || dome === 'unavailable') return 0;
        return states['sensor.tuin_bbq_dome_thermometer_ambient_temperature'].state / states['number.tuin_bbq_dome_thermometer_ambient_maximum_temperature'].state * 100;
      ]]]
    circle_text: >
      [[[
        let probe1 = entity.state;
        if (probe1 === undefined || probe1 === 'unavailable' || probe1 > 700)
          return '-';
        return probe1;
      ]]]
  state_display: >
    [[[
      let dome = entity.state;
      let probe1 = states['sensor.probe_1_temperature'].state;
      let probe2 = states['sensor.probe_2_temperature'].state;
      // in case of an unavailable bluetooth connection or a disconnected probe...
      if (dome === undefined || dome === 'unavailable' || dome > 700) dome = '-';
      if (probe1 === undefined || probe1 === 'unavailable' || probe1 > 700) probe1 = '-';
      if (probe2 === undefined || probe2 === 'unavailable' || probe2 > 700) probe2 = '-';

      let timer = '';
      if (states['timer.bbq'].state === 'active') {
        let finishAt = Date.parse(states['timer.bbq'].attributes['finishes_at']);
        let minutesLeft = Math.round((finishAt - Date.now()) / 1000 / 60);
        timer = ` (🕓 ${minutesLeft} min)`;
      }
      let probeText = [probe1, probe2].filter(p => p !== '-').map(p => `${p}${variables.unit}`).join(' / ');
      if (probeText) probeText = ` / ${probeText}`;
      return html`<span>${dome}${variables.unit}${probeText}${timer}</span>`;
    ]]]
  styles:
    custom_fields:
      info:
        - text-align: right
        - color: >
            [[[
              let color = '';
              if (!states[entity].state) return color;
              if (states[entity].state > 50) color = 'var(--orange)';
              if (states[entity].state > 100) color = 'var(--red)';
              return color;
            ]]]
  tap_action:
    !include ../../dashboards/popups/pp_bbq_garden.yaml


