
light_button:
  card:
    type: tile
    entity: '[[entity]]'
    name: '[[title]]'
    state_content:
    - state
    - brightness
    features:
      - type: "light-brightness"

# Reusable Sonos popup body (custom:sonos-card). Used as browser_mod popup
# content. EVERY card must pass ALL of these variables explicitly — the
# installed decluttering-card does NOT apply `default_variables`, so any
# placeholder a card omits ships to sonos-card as a literal "[[name]]" string
# (e.g. predefinedGroups: "[[groups]]" makes sonos-card iterate the string
# char-by-char → "configEntities is not iterable").
#   - main_player  : entityId the card opens on (string)
#   - entities     : list of media_player entities to show
#   - groups       : predefinedGroups list ([] when the zone has no groups)
#   - sections     : which sections to show. OMIT `queue` for a single/idle
#                    player — the queue view calls getQueue() on the active
#                    player and iterates the result, which throws when idle.
#   - vol_threshold / vol_max : dynamic volume slider tuning
sonos_popup:
  card:
    type: custom:sonos-card
    # remember the picked player in session storage, NOT the URL hash — otherwise
    # selecting a speaker rewrites the hash (e.g. #media_player.office) and Bubble's
    # hash-driven pop-up closes. See punxaphil/custom-sonos-card.
    storePlayerInSessionStorage: true
    sections: '[[sections]]'
    entityId: '[[main_player]]'
    entities: '[[entities]]'
    predefinedGroups: '[[groups]]'
    topFavorites:
      - 'NPO Radio 2'
    player:
      # full-bleed album art forces a huge 1:1 square (~480px); keep it as a
      # compact thumbnail so the popup isn't oversized
      artworkAsBackground: false
    volumes:
      hideCogwheel: false
    grouping:
      skipApplyButton: true
    mediaBrowser:
      itemsPerRow: 3
      replaceHttpWithHttpsForThumbnails: true
    adjustVolumeRelativeToMainPlayer: true
    widthPercentage: 100
    heightPercentage: 100
    dynamicVolumeSlider: true
    dynamicVolumeSliderThreshold: '[[vol_threshold]]'
    dynamicVolumeSliderMax: '[[vol_max]]'
    card_mod:
      style: |
        ha-card {
          /* Force the sonos-card's own dark look regardless of the active
             theme. Material You maps these to light values (light button
             backgrounds + near-white text). The card reads exactly these
             variables (see punxaphil/custom-sonos-card styling docs):
             `color` = main text, --secondary-background-color = group/queue/
             favourite button backgrounds, --primary-color = control accent. */
          color: #e1e1e1;
          --primary-text-color: #e1e1e1;
          --secondary-text-color: #cfd2d4;
          --state-icon-color: #e1e1e1;
          --disabled-text-color: #9da0a2;
          --secondary-background-color: rgba(255,255,255,0.10);
          --primary-color: #3182b7;
          --accent-color: #3182b7;
          /* The header bar and the controls/volume bar are drawn as
             rgba(var(--rgb-card-background-color), opacity) — Material You
             makes that light. --rgb-card-background-color must be an RGB
             *triplet* (not hex) or the rgba() is invalid and falls back to
             light. Pin all three so those panels go dark. */
          --card-background-color: #1c1c1c;
          --ha-card-background: #1c1c1c;
          --rgb-card-background-color: 28, 28, 28;
          /* the card caps itself at ~560px (artwork square), so it can't fill
             the wide popup — center it instead of left-aligning */
          margin-left: auto !important;
          margin-right: auto !important;
        }